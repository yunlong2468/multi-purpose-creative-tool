<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写作模式 - 无限画布</title>
<style>
:root {
  --bg:#0D0D0D; --panel:#171717; --text:#fff; --text2:#A1A1AA;
  --accent:#05A3C5; --danger:#F53F3F; --warn:#F5A623;
  --border:rgba(255,255,255,0.08); --radius:12px;
  --tab-h:44px; --act-w:64px;
  color-scheme:dark;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Inter','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  height:100vh; overflow:hidden; display:flex; flex-direction:row;
}

/* ===== Activity Bar ===== */
#activityBar {
  width:var(--act-w); min-width:var(--act-w); background:var(--panel);
  border-right:0.5px solid var(--border); display:flex; flex-direction:column;
  align-items:center; padding:4px 0; flex-shrink:0; z-index:10;
}
.act-item {
  width:56px; height:40px; display:flex; align-items:center; justify-content:center;
  font-size:21px; cursor:pointer; border-radius:8px; margin:12px auto; position:relative;
  color:var(--text2); transition:all 0.12s; flex-shrink:0;
}
.act-item:hover { color:var(--text); background:rgba(255,255,255,0.06); }
.act-item.active { color:var(--accent); background:rgba(5,163,197,0.12); }
.act-item .act-badge {
  position:absolute; top:3px; right:3px; width:8px; height:8px; border-radius:50%;
  background:var(--accent); display:none;
}
.act-item .act-badge.show { display:block; }
.act-sep { width:40px; height:0.5px; background:var(--border); margin:4px 0; flex-shrink:0; }
.act-bottom { margin-top:auto; display:flex; flex-direction:column; align-items:center; padding-bottom:4px; }
.act-bottom a { width:56px; height:40px; display:flex; align-items:center; justify-content:center; font-size:21px; color:var(--text2); text-decoration:none; border-radius:8px; transition:all 0.12s; }
.act-bottom a:hover { color:var(--text); background:rgba(255,255,255,0.06); }

/* ===== Pane Container ===== */
#paneContainer { flex:1; display:flex; flex-direction:row; overflow:hidden; position:relative; }

/* ===== Pane ===== */
.pane { display:flex; flex-direction:column; overflow:hidden; min-width:280px; flex:1 1 0; }
.pane + .pane-splitter + .pane { border-left:none; }

/* ===== Pane Tab Bar ===== */
.pane-tabs {
  display:flex; align-items:center; height:var(--tab-h); background:var(--panel);
  border-bottom:0.5px solid var(--border); flex-shrink:0; overflow-x:auto; overflow-y:hidden;
  padding:0 4px; gap:1px; user-select:none;
}
.pane-tabs::-webkit-scrollbar { height:2px; }
.pane-tabs::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.06); }
.pane-tab {
  display:flex; align-items:center; gap:4px; padding:6px 12px; font-size:13px;
  color:var(--text2); cursor:pointer; border-radius:4px 4px 0 0; white-space:nowrap;
  border-bottom:2px solid transparent; transition:all 0.1s; height:var(--tab-h);
  flex-shrink:0;
}
.pane-tab:hover { background:rgba(255,255,255,0.04); color:var(--text); }
.pane-tab.active { color:var(--text); border-bottom-color:var(--accent); background:rgba(5,163,197,0.06); }
.pane-tab .tab-close {
  font-size:11px; padding:1px 4px; border-radius:3px; opacity:0; transition:opacity 0.1s;
  line-height:1;
}
.pane-tab:hover .tab-close { opacity:0.6; }
.pane-tab .tab-close:hover { opacity:1; background:rgba(245,63,63,0.2); color:var(--danger); }

/* ===== Pane Content ===== */
.pane-content { flex:1; overflow:hidden; position:relative; }
.pane-content > .panel { position:absolute; inset:0; display:none; flex-direction:column; overflow:hidden; }
.pane-content > .panel.active { display:flex; }

/* ===== Splitter ===== */
.pane-splitter {
  width:5px; min-width:5px; cursor:col-resize; background:rgba(255,255,255,0.03);
  transition:background 0.15s; flex-shrink:0; position:relative; z-index:5;
}
.pane-splitter:hover, .pane-splitter.active { background:var(--accent); }

/* ===== Context Menu ===== */
#ctxMenu {
  position:fixed; display:none; background:var(--panel); border:0.5px solid var(--border);
  border-radius:8px; padding:4px; z-index:999; min-width:160px; box-shadow:0 8px 24px rgba(0,0,0,0.6);
}
#ctxMenu.show { display:block; }
.ctx-item {
  padding:6px 12px; border-radius:4px; cursor:pointer; font-size:13px; color:var(--text2);
  white-space:nowrap; transition:background 0.08s; display:flex; align-items:center; gap:8px;
}
.ctx-item:hover { background:rgba(5,163,197,0.12); color:var(--text); }
.ctx-sep { height:0.5px; background:var(--border); margin:2px 6px; }

/* ===== Zen Mode ===== */
body.zen-mode #activityBar { display:none; }
body.zen-mode .pane-splitter { display:none; }
body.zen-mode .pane { border:none; }
body.zen-mode .pane:not(.zen-active) { display:none; }
#zenExit {
  position:fixed; top:8px; right:12px; z-index:1000; display:none;
  padding:6px 12px; border-radius:6px; border:0.5px solid var(--border);
  background:var(--panel); color:var(--text2); cursor:pointer; font-size:12px;
  font-family:inherit;
}
#zenExit:hover { background:rgba(245,63,63,0.15); color:var(--danger); }
body.zen-mode #zenExit { display:block; }

/* ===== Outline Tree ===== */
.ot-header { padding:10px 14px; border-bottom:0.5px solid var(--border); font-size:14px; font-weight:600; flex-shrink:0; }
.ot-body { flex:1; overflow-y:auto; padding:8px; }
.ot-body::-webkit-scrollbar { width:4px; }
.ot-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
.ot-placeholder { text-align:center; padding:40px 16px; color:var(--text2); font-size:13px; }
.ot-vol { margin-bottom:8px; }
.ot-vol-header { display:flex; align-items:center; padding:4px 6px; border-radius:4px; cursor:pointer; }
.ot-vol-header:hover { background:rgba(255,255,255,0.03); }
.ot-vol-arrow { font-size:11px; margin-right:4px; }
.ot-vol-title { font-size:13px; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ot-vol-add { font-size:10px; padding:1px 4px; border-radius:3px; border:0.5px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-family:inherit; }
.ot-chapters { padding-left:12px; }
.ot-chap { padding:3px 6px; border-radius:4px; cursor:pointer; font-size:12px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ot-chap:hover { background:rgba(255,255,255,0.04); color:var(--text); }
.ot-chap.active { background:rgba(5,163,197,0.12); color:var(--accent); }
.ot-btn { width:100%; padding:6px; border-radius:6px; border:1px dashed var(--border); background:transparent; color:var(--text2); cursor:pointer; font-size:12px; font-family:inherit; margin-top:4px; }
.ot-btn:hover { background:rgba(255,255,255,0.04); color:var(--text); }
.ot-btn.accent { border:none; background:var(--accent); color:#fff; }
.ot-btn.accent:hover { opacity:0.9; }

/* ===== Chat Panel ===== */
.ch-layout { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.ch-header { padding:8px 14px; border-bottom:0.5px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; }
.ch-header .ch-tab { font-size:12px; cursor:pointer; padding:3px 8px; border-radius:4px; transition:all 0.12s; color:var(--text2); }
.ch-header .ch-tab.active { color:var(--accent); background:rgba(5,163,197,0.1); }
.ch-header .ch-tab:hover { background:rgba(255,255,255,0.05); }
.ch-msgs { flex:1; overflow-y:auto; padding:10px 12px; }
.ch-msgs::-webkit-scrollbar { width:4px; }
.ch-msgs::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
.ch-input { padding:8px 12px; border-top:0.5px solid var(--border); display:flex; gap:6px; flex-shrink:0; position:relative; }
.ch-input textarea { flex:1; padding:7px 10px; background:rgba(255,255,255,0.04); border:0.5px solid var(--border); border-radius:10px; color:var(--text); font-size:13px; font-family:inherit; outline:none; resize:none; overflow-y:auto; max-height:120px; line-height:1.5; scrollbar-width:thin; scrollbar-color:transparent transparent; }
.ch-input textarea:focus { border-color:var(--accent); }
.ch-input textarea:hover { scrollbar-color:rgba(255,255,255,0.15) transparent; }
.ch-input textarea::-webkit-scrollbar { width:4px; }
.ch-input textarea::-webkit-scrollbar-button { display:none; }
.ch-input textarea::-webkit-scrollbar-thumb { background:transparent; border-radius:2px; }
.ch-input textarea::-webkit-scrollbar-track { background:transparent; }
.ch-input textarea:hover::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); }
.ch-input textarea::-webkit-scrollbar-corner { display:none; }
.ch-input button { padding:4px 12px; border-radius:14px; border:none; background:var(--accent); color:#fff; cursor:pointer; font-size:13px; font-family:inherit; }
.unread-badge {
  position:absolute; bottom:calc(100% + 4px); right:12px; background:var(--accent);
  color:#fff; border-radius:14px; padding:4px 10px; font-size:12px; cursor:pointer;
  z-index:10; display:none; box-shadow:0 2px 8px rgba(0,0,0,0.4); animation:bounceIn 0.3s; white-space:nowrap;
}
@keyframes bounceIn { from{transform:scale(0.8);opacity:0;} to{transform:scale(1);opacity:1;} }
.unread-badge.show { display:block; }
.mention-dropdown {
  position:absolute; bottom:46px; left:12px; right:12px; background:var(--panel);
  border:0.5px solid var(--border); border-radius:8px; max-height:180px; overflow-y:auto;
  z-index:20; display:none; box-shadow:0 -4px 16px rgba(0,0,0,0.4);
}
.mention-dropdown.show { display:block; }
.mention-dropdown .m-item { padding:7px 10px; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:6px; transition:background 0.08s; }
.mention-dropdown .m-item:hover { background:rgba(5,163,197,0.12); color:var(--text); }

/* ===== Messages ===== */
.msg { display:flex; gap:6px; max-width:100%; animation:fadeIn 0.2s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }
.msg .avatar { width:28px; height:28px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; margin-top:2px; }
.msg .bubble { padding:8px 12px; border-radius:10px; font-size:13px; line-height:1.55; word-break:break-word; max-width:100%; overflow-wrap:break-word; }
.msg .bubble b, .msg .bubble strong { font-weight:700; }
.msg.system-msg { justify-content:center; }
.msg.system-msg .sys-text { font-size:11px; color:var(--text2); background:rgba(255,255,255,0.03); padding:2px 8px; border-radius:10px; max-width:360px; text-align:center; }
.msg.user-msg { flex-direction:row-reverse; }
.msg.user-msg .bubble { background:var(--accent); color:#fff; }
.msg.agent-msg .bubble { background:rgba(255,255,255,0.06); }
.msg.agent-msg .avatar { background:rgba(5,163,197,0.15); }
.msg .think-toggle { display:block; font-size:11px; color:var(--accent); cursor:pointer; margin-top:4px; padding:2px 6px; border-radius:3px; background:rgba(5,163,197,0.08); border:0.5px solid rgba(5,163,197,0.2); }
.msg .think-toggle:hover { background:rgba(5,163,197,0.15); }
.msg .think-body { display:none; font-size:11px; color:var(--text2); background:rgba(0,0,0,0.2); padding:6px 10px; border-radius:4px; margin-top:4px; border-left:2px solid var(--accent); white-space:pre-wrap;text-align:center;text-align:center; max-height:200px; overflow-y:auto; }
.msg .think-body.show { display:block; }
.msg .bubble p { margin:0 0 6px; line-height:1.6; }
.msg .bubble p:last-child { margin-bottom:0; }
.msg-inner { min-height:100%; display:flex; flex-direction:column; justify-content:flex-end; gap:6px; }
.msg-codeblock { background:rgba(0,0,0,0.4); border:0.5px solid rgba(255,255,255,0.1); border-radius:6px; padding:8px 10px; margin:6px 0; font-family:'Consolas','Monaco','Courier New',monospace; font-size:11px; line-height:1.5; white-space:pre-wrap; word-break:break-all; max-height:200px; overflow-y:auto; color:var(--text2); }
.msg-codeblock::-webkit-scrollbar { width:3px; height:3px; }
.msg-codeblock::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
.ap-loading { text-align:center; padding:40px; color:var(--text2); font-size:13px; }

/* ===== Editor Panel ===== */
.ed-topbar { padding:8px 16px; border-bottom:0.5px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.ed-topbar .ed-title { font-size:14px; color:var(--text2); flex:1; }
.ed-topbar button { padding:4px 10px; border-radius:5px; border:0.5px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text2); cursor:pointer; font-size:12px; font-family:inherit; }
.ed-topbar button:hover { background:rgba(255,255,255,0.08); color:var(--text); }
.ed-toolbar { display:flex; gap:2px; padding:6px 16px; border-bottom:0.5px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
.ed-toolbar button, .ed-toolbar select { padding:3px 8px; border-radius:4px; border:0.5px solid transparent; background:transparent; color:var(--text2); cursor:pointer; font-size:12px; font-family:inherit; }
.ed-toolbar button:hover, .ed-toolbar select:hover { background:rgba(255,255,255,0.06); color:var(--text); }
.ed-toolbar .sep { width:0.5px; background:var(--border); margin:2px 6px; }
.ed-body { flex:1; overflow-y:auto; padding:24px 32px; }
.ed-body::-webkit-scrollbar { width:6px; }
.ed-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }
.ed-textarea { width:100%; min-height:60vh; background:transparent; border:none; color:var(--text); font-size:16px; line-height:2; font-family:'PingFang SC','Microsoft YaHei','Noto Serif SC',serif; outline:none; resize:none; }
.ed-placeholder { text-align:center; padding:80px 40px; color:var(--text2); }
.ed-placeholder .icon { font-size:49px; margin-bottom:16px; opacity:0.3; }
.ed-placeholder p { font-size:15px; line-height:1.8; }

/* ===== Token Panel ===== */
.tok-bar { border-top:0.5px solid var(--border); padding:6px 10px; flex-shrink:0; cursor:pointer; }
.tok-bar .tok-detail { display:none; }
.tok-bar.expanded .tok-detail { display:block; }

/* ===== Skill Config Panel ===== */
.sk-header { padding:10px 14px; border-bottom:0.5px solid var(--border); font-size:14px; font-weight:600; flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
.sk-header button { padding:4px 10px; border-radius:5px; border:0.5px solid var(--border); background:var(--accent); color:#fff; cursor:pointer; font-size:12px; font-family:inherit; }
.sk-body { flex:1; overflow-y:auto; padding:8px; }
.sk-body::-webkit-scrollbar { width:4px; }
.sk-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
.sk-card { background:rgba(255,255,255,0.03); border:0.5px solid var(--border); border-radius:8px; padding:10px; margin-bottom:8px; font-size:13px; }
.sk-card .sk-name { font-weight:600; margin-bottom:4px; }
.sk-card .sk-desc { color:var(--text2); font-size:11px; margin-bottom:6px; }
.sk-card .sk-actions { display:flex; gap:4px; }
.sk-card .sk-actions button { padding:2px 8px; border-radius:4px; border:0.5px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-size:11px; font-family:inherit; }
.sk-card .sk-actions button:hover { background:rgba(255,255,255,0.08); color:var(--text); }
.sk-card .sk-actions button.enabled { background:rgba(5,163,197,0.15); color:var(--accent); border-color:var(--accent); }
.sk-card .sk-actions button.danger:hover { background:rgba(245,63,63,0.15); color:var(--danger); border-color:var(--danger); }
.sk-empty { text-align:center; padding:40px 16px; color:var(--text2); font-size:13px; }

/* ===== API Config Panel ===== */
.ac-header { padding:10px 14px; border-bottom:0.5px solid var(--border); font-size:14px; font-weight:600; flex-shrink:0; }
.ac-body { flex:1; overflow-y:auto; padding:8px; }
.ac-body::-webkit-scrollbar { width:4px; }
.ac-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
.ac-card { background:rgba(255,255,255,0.03); border:0.5px solid var(--border); border-radius:8px; padding:10px; margin-bottom:8px; font-size:13px; }
.ac-card .ac-agent { font-weight:600; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
.ac-card .ac-row { display:flex; gap:6px; align-items:center; margin:4px 0; }
.ac-card .ac-row label { font-size:11px; color:var(--text2); min-width:48px; flex-shrink:0; }
.ac-card .ac-row input, .ac-card .ac-row select { flex:1; padding:3px 6px; background:rgba(255,255,255,0.04); border:0.5px solid var(--border); border-radius:4px; color:var(--text); font-size:12px; font-family:inherit; outline:none; }
.ac-card .ac-row input:focus, .ac-card .ac-row select:focus { border-color:var(--accent); }
.ac-card .ac-save { padding:3px 10px; border-radius:4px; border:none; background:var(--accent); color:#fff; cursor:pointer; font-size:11px; font-family:inherit; margin-top:4px; }
.ac-card .ac-save:hover { opacity:0.9; }
.ac-saved { color:rgba(0,180,100,0.8); font-size:11px; margin-left:8px; display:none; }

/* ===== Drag ghost ===== */
.drag-ghost {
  position:fixed; pointer-events:none; z-index:1000;
  background:rgba(23,23,23,0.85); border:0.5px solid var(--accent); border-radius:6px;
  padding:6px 12px; font-size:13px; color:var(--text); white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,0.5); backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}

/* ===== Drop zone indicator ===== */
.drop-zone {
  position:absolute; width:60%; height:2px; background:var(--accent);
  bottom:0; left:20%; z-index:15; display:none; pointer-events:none;
  box-shadow:0 0 6px var(--accent);
}
.drop-zone.show { display:block; }

/* ===== Native form controls in dark mode ===== */
select, option {
  background:var(--panel); color:var(--text);
}
select:focus option:checked {
  background:rgba(5,163,197,0.2); color:var(--text);
}

/* ===== 消息时间 ===== */
.msg-time { font-size:10px; color:var(--text2); margin-top:3px; opacity:0.6; }
.user-msg .msg-time { text-align:right; color:rgba(255,255,255,0.6); }

/* ===== 消息时间 ===== */
.msg-time { font-size:10px; color:var(--text2); margin-top:3px; opacity:0.6; }
.user-msg .msg-time { text-align:right; color:rgba(255,255,255,0.6); }

/* ===== 选项按钮 ===== */
.opt-btns { display:flex; flex-wrap:wrap; gap:4px; margin-top:8px; user-select:none; }
.opt-btn {
  padding:4px 12px; border-radius:14px; border:0.5px solid var(--accent);
  background:rgba(5,163,197,0.1); color:var(--accent); cursor:pointer;
  font-size:12px; font-family:inherit; transition:all 0.12s; white-space:nowrap;
}
.opt-btn:hover { background:rgba(5,163,197,0.22); }
.opt-btn:active { transform:scale(0.96); }
.opt-btn.gone { opacity:0.3; pointer-events:none; border-color:var(--border); color:var(--text2); background:rgba(255,255,255,0.03); }
.opt-btn.picked { opacity:1; background:var(--accent); color:#fff; pointer-events:none; }

/* ===== 用户消息右键菜单 ===== */
.msg.user-msg .bubble { position:relative; cursor:context-menu; }
.msg.user-msg .bubble::after {
  content:''; position:absolute; right:4px; bottom:2px; width:16px; height:16px;
  opacity:0; transition:opacity 0.15s; border-radius:3px;
}
.msg.user-msg .bubble:hover::after { opacity:0.5; background:rgba(255,255,255,0.15); }
#userCtxMenu {
  position:fixed; display:none; background:var(--panel); border:0.5px solid var(--border);
  border-radius:8px; padding:4px; z-index:999; min-width:120px; box-shadow:0 8px 24px rgba(0,0,0,0.6);
}
#userCtxMenu.show { display:block; }
#userCtxMenu .ctx-item { padding:6px 12px; border-radius:4px; cursor:pointer; font-size:13px; color:var(--text2); white-space:nowrap; transition:background 0.08s; display:flex; align-items:center; gap:8px; }
#userCtxMenu .ctx-item:hover { background:rgba(5,163,197,0.12); color:var(--text); }
#userCtxMenu .ctx-item.danger:hover { background:rgba(245,63,63,0.15); color:var(--danger); }
#userCtxMenu .ctx-sep { height:0.5px; background:var(--border); margin:2px 6px; }

/* ===== 思考冒泡动画 ===== */
.typing-dots { display:inline-flex; align-items:center; gap:3px; padding:2px 0; vertical-align:middle; }
.typing-dots b {
  display:block; width:5px; height:5px; border-radius:50%;
  background:var(--accent);
  animation:tkDot 1.4s infinite ease-in-out both;
}
.typing-dots b:nth-child(1){ animation-delay:0s; }
.typing-dots b:nth-child(2){ animation-delay:0.16s; }
.typing-dots b:nth-child(3){ animation-delay:0.32s; }
@keyframes tkDot {
  0%,80%,100%{ transform:scale(0.3); opacity:0.3; }
  40%{ transform:scale(1); opacity:1; }
}

/* ===== Mobile (<768px) ===== */
@media (max-width:767px) {
  :root { --act-w:48px; }
  #paneContainer { flex-direction:column; }
  .pane { min-width:0; }
  .pane-splitter { display:none !important; }
  .pane-tab .tab-close { opacity:0.6; } /* always show on mobile */
  .pane-tabs { -webkit-overflow-scrolling:touch; }
}
</style>
</head>
<body>

<!-- Activity Bar -->
<div id="activityBar">
  <div class="act-item active" data-panel="outline" title="大纲 (Ctrl+1)" onclick="ACT.focus('outline')">📖</div>
  <div class="act-item" data-panel="chat" title="对话 (Ctrl+2)" onclick="ACT.focus('chat')">💬</div>
  <div class="act-sep"></div>
  <div class="act-item" data-panel="skillConfig" title="Skill配置 (Ctrl+3)" onclick="ACT.focus('skillConfig')">🧠</div>
  <div class="act-item" data-panel="apiConfig" title="API配置 (Ctrl+4)" onclick="ACT.focus('apiConfig')">⚙️</div>
  <div class="act-bottom">
    <a href="/projects.html?mode=writing" title="返回项目列表">←</a>
  </div>
</div>

<!-- Pane Container -->
<div id="paneContainer"></div>

<!-- Context Menu -->
<div id="ctxMenu"></div>

<!-- User Message Context Menu -->
<div id="userCtxMenu"></div>

<!-- Zen Mode Exit -->
<button id="zenExit" onclick="ZEN.exit()">✕ 退出全屏</button>

<!-- Toast -->
<div id="_toast" style="position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:999;padding:8px 20px;border-radius:8px;font-size:14px;font-family:inherit;pointer-events:none;opacity:0;transition:opacity 0.3s;"></div>

<script>
// ===== Auth & API helpers =====
var token=localStorage.getItem('canvas_token'); if(!token)window.location.replace('/login.html');
var ep=new URLSearchParams(location.search).get('pid');
var projectId=ep?Math.round(parseInt(ep)/1114514):null;
if(!projectId)window.location.replace('/projects.html');
var API='/api';
function api(m,p,b){var o={method:m,headers:{'Content-Type':'application/json','Authorization':'Bearer '+token}};if(b)o.body=JSON.stringify(b);return fetch(API+p,o).then(function(r){if(r.status===401){return r.json().then(function(d){var k=d&&d.error&&d.error.indexOf('已在其他设备登录')>=0;localStorage.removeItem('canvas_token');localStorage.removeItem('canvas_username');window.location.replace('/login.html'+(k?'?reason=kicked':''));return Promise.reject();}).catch(function(){localStorage.removeItem('canvas_token');localStorage.removeItem('canvas_username');window.location.replace('/login.html');return Promise.reject();});}var ct=r.headers.get('content-type')||'';if(ct.indexOf('json')>=0)return r.json();return r.text().then(function(t){try{return JSON.parse(t);}catch(e){return null;}});});}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(m,t){var el=document.getElementById('_toast');el.textContent=m;el.style.background=t==='error'?'rgba(245,63,63,0.9)':t==='warn'?'rgba(245,166,35,0.9)':'rgba(0,180,100,0.9)';el.style.color='#fff';el.style.opacity='1';if(el._t)clearTimeout(el._t);el._t=setTimeout(function(){el.style.opacity='0';},2500);}
function showPrompt(msg,dv,cb){var ov=document.createElement('div');ov.className='prompt-overlay';ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:800;display:flex;align-items:center;justify-content:center;';ov.innerHTML='<div style="background:#171717;border:0.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:24px;width:380px;"><div style="font-size:15px;margin-bottom:12px;color:#fff;">'+escHtml(msg)+'</div><input id="_promptInp" style="width:100%;padding:8px 12px;background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;font-size:14px;font-family:inherit;outline:none;" value="'+escHtml(dv||'')+'"><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;"><button style="padding:8px 18px;border-radius:6px;border:0.5px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.06);color:#A1A1AA;cursor:pointer;font-family:inherit;" onclick="this.closest(\'.prompt-overlay\').remove()">取消</button><button style="padding:8px 18px;border-radius:6px;border:none;background:#05A3C5;color:#fff;cursor:pointer;font-family:inherit;" onclick="var v=document.getElementById(\'_promptInp\').value;var o2=this.closest(\'.prompt-overlay\');o2.remove();(_pCb||function(){})(v)">确定</button></div></div>';document.body.appendChild(ov);window._pCb=cb;ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});}
function showConfirm(msg,cb){var ov=document.createElement('div');ov.className='prompt-overlay';ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:800;display:flex;align-items:center;justify-content:center;';ov.innerHTML='<div style="background:#171717;border:0.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:24px;width:380px;"><div style="font-size:15px;margin-bottom:16px;color:#fff;line-height:1.8;white-space:pre-wrap;text-align:center;">'+escHtml(msg)+'</div><div style="display:flex;gap:8px;justify-content:flex-end;"><button style="padding:8px 18px;border-radius:6px;border:0.5px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.06);color:#A1A1AA;cursor:pointer;font-family:inherit;" onclick="this.closest(\'.prompt-overlay\').remove()">取消</button><button style="padding:8px 18px;border-radius:6px;border:none;background:#F53F3F;color:#fff;cursor:pointer;font-family:inherit;" onclick="var o2=this.closest(\'.prompt-overlay\');o2.remove();(window._cfCb||function(){})()">确认</button></div></div>';document.body.appendChild(ov);window._cfCb=cb;ov.addEventListener('click',function(e){if(e.target===ov)ov.remove();});}

// ===== Keyboard shortcuts =====
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey || e.metaKey) {
    if (e.key==='1') { e.preventDefault(); ACT.focus('outline'); }
    else if (e.key==='2') { e.preventDefault(); ACT.focus('chat'); }
    else if (e.key==='3') { e.preventDefault(); ACT.focus('skillConfig'); }
    else if (e.key==='4') { e.preventDefault(); ACT.focus('apiConfig'); }
  }
  if (e.key==='Escape' && document.body.classList.contains('zen-mode')) { ZEN.exit(); }
});
</script>

<script src="write.js"></script>
</body>
</html>
