// ==================== 视口交互 ====================
viewport.addEventListener('mousedown', function(e) {
  // 中键（或Alt+左键）→ 平移
  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    isPanning = true; panStartX = e.clientX; panStartY = e.clientY; panCamX = camera.targetX; panCamY = camera.targetY;
    viewport.classList.add('grabbing');
    e.preventDefault(); return;
  }
  // 只处理左键
  if (e.button !== 0) return;

  var target = e.target;
  var connPt = target.closest('.conn-point');
  var connPath = target.closest('#connections-svg path:not(.conn-dragging)');
  var nodeEl = target.closest('.world-node');
  var noteEl = target.closest('.world-note');

  // 连接点 → 拖拽连线
  if (connPt && nodeEl) {
    var side = connPt.dataset.side;
    var nid = nodeEl.dataset.id;
    var hit = findMediaById(nid);
    if (!hit) return;
    if (side === 'right') {
      isDraggingConnection = true; connDragSrcId = nid;
      connDragMouseX = e.clientX; connDragMouseY = e.clientY;
      updateConnectionsSvg();
    } else if (side === 'left') {
      var linked = connections.filter(function(c){return c.targetId===nid;});
      if (linked.length > 0) {
        var oldSrc = linked[0].sourceId; linked.forEach(function(c){removeConnection(c.id);});
        isDraggingConnection = true; connDragSrcId = oldSrc;
        connDragMouseX = e.clientX; connDragMouseY = e.clientY;
        updateConnectionsSvg();
      }
    }
    e.stopPropagation(); e.preventDefault(); return;
  }

  // 连线路径 → 选中连线
  if (connPath && connPath.dataset.connId) {
    connClickTarget = connPath.dataset.connId;
    connClickStart = { x: e.clientX, y: e.clientY };
    e.stopPropagation(); e.preventDefault(); return;
  }

  // 便签
  if (noteEl) {
    var noteId = noteEl.dataset.id;
    var hitN = findNoteById(noteId);
    if (!hitN) return;
    // 缩放手柄
    if (target.closest('.note-resize-wrap')) {
      isResizingNote = true; resizeNoteId = noteId;
      resizeOrigW = hitN.note.width; resizeOrigH = hitN.note.height;
      resizeOrigX = e.clientX; resizeOrigY = e.clientY;
      e.stopPropagation(); e.preventDefault(); return;
    }
    // 已在框选组内 → 保持多选，编组拖拽
    if ((selectedMediaIds.length + selectedNoteIds.length) > 1 && selectedNoteIds.indexOf(noteId) >= 0) {
      // 保持当前多选，不清除
    } else if (!e.shiftKey) {
      selectedMediaIds = []; selectedNoteIds = []; selectedConnectionId = null;
      selectedNoteIds.push(noteId);
      refreshSelections();
    } else {
      selectNote(noteId, true);
    }
    bringToFront(noteEl);
    // 双击进入编辑后 → 不拖拽
    var noteCard = target.closest('.note-card');
    if (noteCard && noteCard.isContentEditable) return;
    // 多选状态 → 编组拖拽
    pushUndo();
    if ((selectedMediaIds.length + selectedNoteIds.length) > 1) {
      isGroupDragging = true;
      groupDragStart = {};
      selectedMediaIds.forEach(function(id) { var h2 = findMediaById(id); if (h2) { groupDragStart[id] = { x: h2.node.x, y: h2.node.y }; } });
      selectedNoteIds.forEach(function(id) { var h3 = findNoteById(id); if (h3) { groupDragStart[id] = { x: h3.note.x, y: h3.note.y }; } });
    } else {
      isDraggingNote = true; draggedNoteId = noteId;
    }
    dragStartWX = screenToWorld(e.clientX, e.clientY).x;
    dragStartWY = screenToWorld(e.clientX, e.clientY).y;
    dragNoteOrigX = hitN.note.x; dragNoteOrigY = hitN.note.y;
    e.stopPropagation(); e.preventDefault(); return;
  }

  // 节点（非交互元素）
  if (nodeEl) {
    var nodeId = nodeEl.dataset.id;
    var hitM = findMediaById(nodeId);
    if (!hitM) return;
    if (currentTool === 'note') return;
    if (target.tagName === 'TEXTAREA' || target.tagName === 'INPUT' || target.tagName === 'BUTTON' || target.isContentEditable) return;
    if (target.closest('.frame-table-preview') || target.closest('.frame-body')) { e.stopPropagation(); return; }

    // 已在框选组内 → 保持多选（不清除），直接编组拖拽
    if (selectedMediaIds.length > 1 && selectedMediaIds.indexOf(nodeId) >= 0) {
      // 保持当前多选，不清除
    } else if (!e.shiftKey) {
      selectedMediaIds = []; selectedNoteIds = []; selectedConnectionId = null;
      selectedMediaIds.push(nodeId);
      refreshSelections();
    } else {
      selectMedia(nodeId, true);
    }
    bringToFront(nodeEl, nodeId);
    if (!nodeEl.isConnected) { nodeEl = ensureNodeEl(hitM.node); }

    // 视频节点（已加载） → 单击播放
    if (hitM.node.type === 'video' && hitM.node.src && !hitM.node.playing && !isInDragZone(e, nodeEl, hitM.node)) {
      toggleVideoPlay(hitM.node); return;
    }
    // 视频节点（已加载） → 播放
    if (hitM.node.type === 'video' && hitM.node.src && !hitM.node.playing && !isInDragZone(e, nodeEl, hitM.node)) {
      toggleVideoPlay(hitM.node); return;
    }

    startNodeDrag(e, hitM, nodeId);
    e.stopPropagation(); e.preventDefault(); return;
  }

  // 其余一律视为空白处点击
  clearSelection();
  if (currentTool === 'select') {
    isBoxSelecting = true; boxStartX = e.clientX; boxStartY = e.clientY;
    boxSelect.style.display = 'block'; boxSelect.style.left = boxStartX+'px'; boxSelect.style.top = boxStartY+'px'; boxSelect.style.width = '0'; boxSelect.style.height = '0';
  } else if (currentTool === 'note') {
    var w = screenToWorld(e.clientX, e.clientY);
    addNote(w.x, w.y);
  } else if (['image','video','script','frame'].indexOf(currentTool) >= 0) {
    var w2 = screenToWorld(e.clientX, e.clientY);
    addMediaNode(w2.x, w2.y, currentTool);
    currentTool = 'select'; updateToolbarUI();
  }

});

function isInDragZone(e, el, node) {
  var rect = el.getBoundingClientRect();
  var relX = e.clientX - rect.left, relY = e.clientY - rect.top;
  var pad = 50;
  return relX < pad || relX > node.width - pad || relY < pad || relY > node.height - pad;
}

function startNodeDrag(e, hit, nodeId) { pushUndo();
  if (selectedMediaIds.length > 1 && selectedMediaIds.indexOf(nodeId) >= 0) {
    isGroupDragging = true;
    groupDragStart = {};
    selectedMediaIds.forEach(function(id) { var h2 = findMediaById(id); if (h2) { groupDragStart[id] = { x: h2.node.x, y: h2.node.y }; } });
    selectedNoteIds.forEach(function(id) { var h3 = findNoteById(id); if (h3) { groupDragStart[id] = { x: h3.note.x, y: h3.note.y }; } });
  } else {
    isDraggingNode = true; draggedNodeId = nodeId;
    dragNodeOrigX = hit.node.x; dragNodeOrigY = hit.node.y;
  }
  dragStartWX = screenToWorld(e.clientX, e.clientY).x;
  dragStartWY = screenToWorld(e.clientX, e.clientY).y;
}

// ==================== 鼠标移动 ====================
window.addEventListener('mousemove', function(e) {
  if (isPanning) {
    var dx = e.clientX - panStartX, dy = e.clientY - panStartY;
    camera.targetX = panCamX + dx; camera.targetY = panCamY + dy;
    camera.x = camera.targetX; camera.y = camera.targetY;
    applyCamera();
  }
  if (isDraggingConnection) {
    connDragMouseX = e.clientX; connDragMouseY = e.clientY;
    updateConnectionsSvg();
  }
  if (isDraggingNode && draggedNodeId) {
    var w = screenToWorld(e.clientX, e.clientY);
    var ndx = w.x - dragStartWX, ndy = w.y - dragStartWY;
    var hit = findMediaById(draggedNodeId);
    if (hit) { hit.node.x = dragNodeOrigX + ndx; hit.node.y = dragNodeOrigY + ndy; var el = document.querySelector('.world-node[data-id="'+draggedNodeId+'"]'); if (el) { el.style.left = hit.node.x+'px'; el.style.top = hit.node.y+'px'; } updateConnectionsSvg(); }
  }
  if (isGroupDragging) {
    var w2 = screenToWorld(e.clientX, e.clientY);
    var gdx = w2.x - dragStartWX, gdy = w2.y - dragStartWY;
    selectedMediaIds.forEach(function(id) {
      var o = groupDragStart[id]; if (!o) return;
      var h2 = findMediaById(id); if (h2) { h2.node.x = o.x + gdx; h2.node.y = o.y + gdy; var el2 = document.querySelector('.world-node[data-id="'+id+'"]'); if (el2) { el2.style.left = h2.node.x+'px'; el2.style.top = h2.node.y+'px'; } }
    });
    selectedNoteIds.forEach(function(id) {
      var o2 = groupDragStart[id]; if (!o2) return;
      var h3 = findNoteById(id); if (h3) { h3.note.x = o2.x + gdx; h3.note.y = o2.y + gdy; var el3 = document.querySelector('.world-note[data-id="'+id+'"]'); if (el3) { el3.style.left = h3.note.x+'px'; el3.style.top = h3.note.y+'px'; } }
    });
    updateConnectionsSvg();
  }
  if (isDraggingNote && draggedNoteId) {
    var w3 = screenToWorld(e.clientX, e.clientY);
    var ndx2 = w3.x - dragStartWX, ndy2 = w3.y - dragStartWY;
    var nHit = findNoteById(draggedNoteId);
    if (nHit) { nHit.note.x = dragNoteOrigX + ndx2; nHit.note.y = dragNoteOrigY + ndy2; var nel = document.querySelector('.world-note[data-id="'+draggedNoteId+'"]'); if (nel) { nel.style.left = nHit.note.x+'px'; nel.style.top = nHit.note.y+'px'; } }
  }
  if (isResizingNote && resizeNoteId) {
    var rHit = findNoteById(resizeNoteId);
    if (rHit) {
      var rdx = (e.clientX - resizeOrigX) / camera.scale;
      var rdy = (e.clientY - resizeOrigY) / camera.scale;
      rHit.note.width = Math.max(80, resizeOrigW + rdx);
      rHit.note.height = Math.max(50, resizeOrigH + rdy);
      var rel = document.querySelector('.world-note[data-id="'+resizeNoteId+'"]');
      if (rel) { rel.style.width = rHit.note.width+'px'; rel.style.height = rHit.note.height+'px'; }
    }
  }
  if (isBoxSelecting) {
    boxSelect.style.left = Math.min(boxStartX, e.clientX)+'px';
    boxSelect.style.top = Math.min(boxStartY, e.clientY)+'px';
    boxSelect.style.width = Math.abs(e.clientX - boxStartX)+'px';
    boxSelect.style.height = Math.abs(e.clientY - boxStartY)+'px';
  }
  if (connClickTarget && connClickStart) {
    var cdx = e.clientX - connClickStart.x, cdy = e.clientY - connClickStart.y;
    if (Math.abs(cdx) > 4 || Math.abs(cdy) > 4) {
      var c = findConnectionById(connClickTarget);
      if (c) { var oldSrc = c.sourceId; removeConnection(c.id); isDraggingConnection = true; connDragSrcId = oldSrc; connDragMouseX = e.clientX; connDragMouseY = e.clientY; updateConnectionsSvg(); }
      connClickTarget = null; connClickStart = null;
    }
  }
});

// ==================== 鼠标松开 ====================
window.addEventListener('mouseup', function(e) {
  if (isPanning) { isPanning = false; viewport.classList.remove('grabbing'); }

  if (isDraggingConnection) {
    var w = screenToWorld(e.clientX, e.clientY);
    var snapped = false;
    for (var i = mediaNodes.length-1; i >=0; i--) {
      var tn = mediaNodes[i];
      if (tn.id === connDragSrcId) continue;
      var tgtX = tn.x - tn.width/2, tgtY = tn.y;
      var dist = Math.hypot(w.x - tgtX, w.y - tgtY);
      if (dist < 40 / camera.scale) { addConnection(connDragSrcId, tn.id); snapped = true; break; }
    }
    if (!snapped) {
      // 无吸附 → 弹出节点创建菜单
      var frozenSrcId = connDragSrcId;
      var frozenX = w.x, frozenY = w.y;
      console.log('[拖拽连线] 松开无吸附, srcId='+frozenSrcId+' mouseWorld=('+frozenX.toFixed(1)+','+frozenY.toFixed(1)+')');
      connDragSrcId = null;
      isDraggingConnection = false;
      updateConnectionsSvg();
      showDragCreateMenu(e.clientX, e.clientY, frozenSrcId, frozenX, frozenY);
    } else {
      isDraggingConnection = false; connDragSrcId = null;
    }
    updateConnectionsSvg();
  }

  if (connClickTarget && connClickStart) {
    selectConnection(connClickTarget);
    connClickTarget = null; connClickStart = null;
  }

  if (isBoxSelecting) {
    isBoxSelecting = false; boxSelect.style.display = 'none';
    var minX = Math.min(boxStartX, e.clientX), maxX = Math.max(boxStartX, e.clientX);
    var minY = Math.min(boxStartY, e.clientY), maxY = Math.max(boxStartY, e.clientY);
    if (maxX - minX > 4 || maxY - minY > 4) {
      selectedMediaIds = []; selectedNoteIds = [];
      mediaNodes.forEach(function(n) {
        var hw = n.width * camera.scale / 2, hh = n.height * camera.scale / 2;
        var sp = worldToScreen(n.x, n.y);
        if (sp.x + hw >= minX && sp.x - hw <= maxX && sp.y + hh >= minY && sp.y - hh <= maxY) selectedMediaIds.push(n.id);
      });
      notes.forEach(function(n) {
        var hw2 = n.width * camera.scale / 2, hh2 = n.height * camera.scale / 2;
        var sp2 = worldToScreen(n.x, n.y);
        if (sp2.x + hw2 >= minX && sp2.x - hw2 <= maxX && sp2.y + hh2 >= minY && sp2.y - hh2 <= maxY) selectedNoteIds.push(n.id);
      });
      refreshSelections();
    }
  }

  if (isDraggingNode) { isDraggingNode = false; draggedNodeId = null; autoSave(); }
  if (isGroupDragging) { isGroupDragging = false; autoSave(); }
  if (isDraggingNote) { isDraggingNote = false; draggedNoteId = null; autoSave(); }
  if (isResizingNote) { isResizingNote = false; resizeNoteId = null; autoSave(); }
});

// ==================== 双击节点交互 ====================
viewport.addEventListener('dblclick', function(e) {
  // 双击媒体标题栏 → 编辑 name
  var mediaTitle = e.target.closest('.media-title');
  if (mediaTitle && mediaTitle.dataset.nodeId) {
    var nid = mediaTitle.dataset.nodeId;
    var hit2 = findMediaById(nid);
    if (hit2 && hit2.node.nameLocked) { console.log('[name编辑] 拒绝: '+nid+' 已锁定'); return; }
    if (hit2) {
      showPrompt('节点名称（用于帧节点匹配）:', hit2.node.name || '', function(newName) {
        if (newName !== null && newName.trim()) {
          hit2.node.name = newName.trim();
          console.log('[name编辑] '+nid+' name="'+hit2.node.name+'"');
          buildNodeContent(hit2.node, mediaTitle.parentNode); autoSave();
        }
      });
      return;
    }
  }
  // 双击空/已加载图片节点 → 打开图片来源选择弹窗
  var nodeEl = e.target.closest('.world-node');
  if (!nodeEl) return;
  var hit = findMediaById(nodeEl.dataset.id);
  if (!hit) return;
  if (hit.node.type === 'video' && (hit.node.state === 'empty' || hit.node.src)) {
    var inp = document.createElement('input'); inp.type = 'file';
    inp.accept = 'video/*';
    inp.onchange = function(ev) { var f = ev.target.files[0]; if (f) loadMediaIntoNode(hit.node.id, f); };
    inp.click();
  } else if (hit.node.type === 'image' && (hit.node.state === 'empty' || hit.node.src)) {
    showImageSourceDialog(hit.node.id);
  }
});

// ==================== 缩放 ====================
viewport.addEventListener('wheel', function(e) {
  // textarea / contentEditable / 帧表格预览 → 原生滚动，不缩放画布
  if (e.target.tagName === 'TEXTAREA' || e.target.isContentEditable || e.target.closest('.frame-table-preview') || e.target.closest('.modal-body')) return;
  e.preventDefault();
  var zoomFactor = e.deltaY < 0 ? 1.09 : 1/1.09;
  var newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, camera.targetScale * zoomFactor));
  var vo = viewportOffset();
  var wx = (e.clientX - vo.left - camera.targetX) / camera.targetScale;
  var wy = (e.clientY - vo.top - camera.targetY) / camera.targetScale;
  camera.targetX = e.clientX - vo.left - wx * newScale;
  camera.targetY = e.clientY - vo.top - wy * newScale;
  camera.targetScale = newScale;
  showZoomIndicator();
}, { passive: false });

// ==================== 右键菜单 ====================
document.addEventListener('contextmenu', function(e) {
  e.preventDefault(); e.stopPropagation();
  contextMenu.style.display = 'none'; // 先关旧的
  var nodeEl = e.target.closest('.world-node');
  var noteEl = e.target.closest('.world-note');
  if (nodeEl) showNodeContextMenu(e, nodeEl);
  else if (noteEl) showNoteContextMenu(e, noteEl);
  else showCanvasContextMenu(e);
});
document.addEventListener('mousedown', function(e) {
  if (e.button !== 2 && !contextMenu.contains(e.target)) contextMenu.style.display = 'none';
});

function showCanvasContextMenu(e) {
  var w = screenToWorld(e.clientX, e.clientY);
  var items = [
    { label: '📝 添加便签', act: 'addNote' },
    { label: '🖼️ 添加图片节点', act: 'addImage' },
    { label: '🎬 添加视频节点', act: 'addVideo' },

  showContextMenuAt(e.clientX, e.clientY, items, function(act) {

    else if (act === 'addImage') addMediaNode(w.x, w.y, 'image');
    else if (act === 'addVideo') addMediaNode(w.x, w.y, 'video');
    else if (act === 'addScript') addMediaNode(w.x, w.y, 'script');
    else if (act === 'addFrame') addMediaNode(w.x, w.y, 'frame');
  });
}

function showNodeContextMenu(e, nodeEl) {
  var nid = nodeEl.dataset.id;
  var hit = findMediaById(nid);
  if (!hit) return;
  var items = [
    { label: '🔍 聚焦查看', act: 'focus' },
  ];
  if (hit.node.type === 'image' && hit.node.src) {
    items.push({ label: '🔎 放大查看', act: 'zoom' });
  }
  items.push({ label: '📋 复制节点', act: 'duplicate' });
  items.push({ label: hit.node.locked ? '🔓 解锁' : '🔒 锁定', act: 'toggleLock' });
  items.push({ label: '🗑️ 删除节点', act: 'delete', cls: 'danger' });
  showContextMenuAt(e.clientX, e.clientY, items, function(act) {
    if (act === 'focus') focusOnNode(hit.node);
    if (act === 'zoom') { console.log('[放大查看] 节点='+nid+' src='+hit.node.src); showImagePreview(hit.node.src, hit.node.name||nid); }
    if (act === 'duplicate') duplicateNode(hit.node);
    if (act === 'toggleLock') { hit.node.locked = !hit.node.locked; autoSave(); }
    if (act === 'delete') deleteNode(nid);
  });
}
function showNoteContextMenu(e, noteEl) {
  var nid = noteEl.dataset.id;
  var nh = findNoteById(nid);
  if (!nh) return;
  var items = [
    { label: '📋 复制便签', act: 'copy' },
    { label: '🎨 ' + (nh.note.color === '#1a1a2e' ? '粉色' : nh.note.color === '#2e1a2e' ? '蓝色' : nh.note.color === '#1a2e2e' ? '暖色' : '默认色'), act: 'cycleColor' },
    { label: nh.note.locked ? '🔓 解锁' : '🔒 锁定', act: 'toggleLock' },
    { label: '🗑️ 删除便签', act: 'delete', cls: 'danger' },
  ];
  showContextMenuAt(e.clientX, e.clientY, items, function(act) {
    if (act === 'copy') { var nn = Object.assign({}, nh.note, { id:'note_'+(++noteIdCounter), x: nh.note.x+50, y: nh.note.y+50 }); notes.push(nn); createNoteEl(nn); autoSave(); }
    if (act === 'cycleColor') {
      var colors = ['#1a1a2e','#2e1a2e','#1a2e2e','#2e2e1a','#1e2e2e','#2e1e1a'];
      var ci = colors.indexOf(nh.note.color);
      nh.note.color = colors[(ci+1)%colors.length];
      var inner = noteEl.querySelector('.note-card');
      if (inner) inner.style.background = nh.note.color;
      autoSave();
    }
    if (act === 'toggleLock') { nh.note.locked = !nh.note.locked; noteEl.style.zIndex = nh.note.locked ? 0 : 1; autoSave(); }
    if (act === 'delete') deleteNote(nid);
  });
}
function showContextMenuAt(x, y, items, callback) {
  contextMenu.innerHTML = items.map(function(it) {
    return '<div class="item'+(it.cls?' '+it.cls:'')+'" data-act="'+it.act+'">'+it.label+'</div>';
  }).join('');
  contextMenu.style.left = x + 'px';
  contextMenu.style.top = y + 'px';
  contextMenu.style.display = 'block';
  contextMenu.querySelectorAll('.item').forEach(function(item) {
    item.addEventListener('mousedown', function(ev) { ev.stopPropagation(); ev.preventDefault(); contextMenu.style.display = 'none'; callback(item.dataset.act); });
  });
}
function duplicateNode(node) {
  var nn = Object.assign({}, node);
  nn.id = (nn.type==='script'?'scr_':nn.type==='frame'?'frm_':'md_')+(++mediaIdCounter);
  nn.x += 60; nn.y += 60;
  nn.nameLocked = false; // 复制的节点允许改名
  if (nn.type==='script') { nn.outputText = ''; }
  if (nn.type==='frame') { nn.frameOutputRaw = ''; nn.frameOutputJson = null; }
  mediaNodes.push(nn); createNodeEl(nn); autoSave();
  console.log('[复制节点] 原='+node.id+' 新='+nn.id+' nameLocked已解除');
}

function deleteNode(id) { if (!_skipUndoPush) pushUndo();
  var el = document.querySelector('.world-node[data-id="'+id+'"]');
  if (el) el.remove();
  connections = connections.filter(function(c){return c.sourceId!==id && c.targetId!==id;});
  mediaNodes = mediaNodes.filter(function(n){return n.id!==id;});
  selectedMediaIds = selectedMediaIds.filter(function(x){return x!==id;});
  updateConnectionsSvg(); autoSave();
}
function deleteNote(id) {
  var el = document.querySelector('.world-note[data-id="'+id+'"]');
  if (el) el.remove();
  notes = notes.filter(function(n){return n.id!==id;});
  selectedNoteIds = selectedNoteIds.filter(function(x){return x!==id;});
  autoSave();
}

// ==================== 键盘 ====================
document.addEventListener('keydown', function(e) {
  // TEXTAREA / contentEditable 内放行原生快捷键
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.isContentEditable) return;
  // Ctrl+C/X/V/Z
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'c' || e.key === 'C') { e.preventDefault(); copySelected(); }
    else if (e.key === 'x' || e.key === 'X') { e.preventDefault(); cutSelected(); }
    else if (e.key === 'v' || e.key === 'V') { e.preventDefault(); pasteNodes(); }
    else if (e.key === 'z' || e.key === 'Z') { e.preventDefault(); undo(); }
    return;
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedConnectionId) { removeConnection(selectedConnectionId); return; }
    pushUndo(); _skipUndoPush = true;
    selectedMediaIds.forEach(function(id) { deleteNode(id); });
    selectedNoteIds.forEach(function(id) { deleteNote(id); });
    _skipUndoPush = false;
  }
  if (e.key === 'Escape') { clearSelection(); }
});

// ==================== 视频播放（定义在末尾） ====================

// ==================== 聚焦节点 ====================
function focusOnNode(node) {
  var targetScale = Math.min(window.innerWidth*0.9/node.width, (window.innerHeight-44)*0.7/node.height);
  targetScale = Math.max(0.4, Math.min(1.5, targetScale));
  camera.targetScale = targetScale;
  camera.targetX = window.innerWidth/2 - node.x * targetScale;
  camera.targetY = (window.innerHeight-44)/2 - node.y * targetScale;
}

// ==================== 文件上传 ====================
function fitNodeSize(node, w, h) {
  var maxDim = 560, minDim = 160;
  var ratio = w / h;
  if (ratio >= 1) { node.width = Math.min(maxDim, Math.max(minDim, Math.round(maxDim * ratio / Math.max(ratio, 1)))); node.height = Math.round(node.width / ratio); }
  else { node.height = Math.min(maxDim, Math.max(minDim, Math.round(maxDim / ratio))); node.width = Math.round(node.height * ratio); }
  node.width = Math.max(minDim, Math.round(node.width));
  node.height = Math.max(minDim, Math.round(node.height));
}
function loadMediaIntoNode(nodeId, file) {
  var hit = findMediaById(nodeId);
  if (!hit) return;
  var fd = new FormData(); fd.append('file', file);
  fetch(API+'/upload', { method:'POST', headers:{'Authorization':'Bearer '+token}, body:fd }).then(function(r) { return r.json(); }).then(function(d) {
    if (!d || !d.url) return;
    hit.node.src = d.url; hit.node.file = file; hit.node.state = 'loaded';

      v.onloadedmetadata = function() { fitNodeSize(hit.node, v.videoWidth||640, v.videoHeight||360); var el2=document.querySelector('.world-node[data-id="'+nodeId+'"]'); if (el2) buildNodeContent(hit.node, el2); autoSave(); };

      });

  }).catch(function() {

    autoSave();
  });
}

// ==================== 序列化 ====================
function serializeCanvas() {
  var mNodes = mediaNodes.map(function(n) {
    var o = { id:n.id, type:n.type, x:n.x, y:n.y, width:n.width, height:n.height, state:n.state||'loaded', locked:n.locked, src:n.src, name:n.name||'', nameLocked:n.nameLocked||false, frameId:n.frameId||'', genState:n.genState||'', genError:n.genError||'', genFrameKey:n.genFrameKey||'', genSize:n.genSize||'', progress:n.progress||{active:false,label:''} };
    if (n.file) { o.fileName = n.file.name; o.fileSize = n.file.size; o.fileType = n.file.type; }
    if (n.type==='script') { o.inputText=n.inputText; o.outputText=n.outputText; o.agentId=n.agentId; o.outputScrollOffset=n.outputScrollOffset; }
    if (n.type==='frame') { o.images=n.images; o.scrollOffset=n.scrollOffset; o.sourceScriptId=n.sourceScriptId; o.frameInputText=n.frameInputText; o.frameOutputJson=n.frameOutputJson; o.frameOutputRaw=n.frameOutputRaw; o.frameAgentId=n.frameAgentId; o.frameOutputScroll=n.frameOutputScroll; o.frameError=n.frameError||''; }
    return o;
  });
  return { notes: notes, mediaNodes: mNodes, connections: connections };
}

function extractMaxId(items, prefixes) {
  var max = 0;
  (items||[]).forEach(function(item) {
    if (!item.id) return;
    for (var i = 0; i < prefixes.length; i++) {
      if (item.id.indexOf(prefixes[i]) === 0) {
        var n = parseInt(item.id.substring(prefixes[i].length));
        if (n > max) max = n;
        break;
      }
    }
  });
  return max;
}
function restoreCanvas(data) {
  document.querySelectorAll('.world-node,.world-note').forEach(function(el){ el.remove(); });
  mediaNodes = []; notes = []; connections = [];
  if (data.notes) { data.notes.forEach(function(n) { notes.push(n); createNoteEl(n); }); noteIdCounter = extractMaxId(data.notes, ['note_']); }
  if (data.mediaNodes) { data.mediaNodes.forEach(function(n) { n.playing=false; if (!n.progress) n.progress = {active:false,label:''}; if (n.name===undefined) n.name=''; if (n.nameLocked===undefined) n.nameLocked=false; if (n.frameId===undefined) n.frameId=''; if (n.genState===undefined) n.genState=''; if (n.genError===undefined) n.genError=''; if (n.genFrameKey===undefined) n.genFrameKey=''; if (n.genSize===undefined) n.genSize=''; mediaNodes.push(n); createNodeEl(n); }); mediaIdCounter = extractMaxId(data.mediaNodes, ['md_','scr_','frm_']); }
  if (data.connections) { connections = data.connections; connIdCounter = extractMaxId(data.connections, ['conn_']); }
  updateConnectionsSvg();
}

window.fitAll = function() {
  if (!mediaNodes.length && !notes.length) { camera.targetScale = 1; camera.targetX = window.innerWidth/2; camera.targetY = (window.innerHeight-44)/2; return; }
  var minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  mediaNodes.forEach(function(n) { minX=Math.min(minX,n.x-n.width/2); maxX=Math.max(maxX,n.x+n.width/2); minY=Math.min(minY,n.y-n.height/2); maxY=Math.max(maxY,n.y+n.height/2); });
  notes.forEach(function(n) { minX=Math.min(minX,n.x-n.width/2); maxX=Math.max(maxX,n.x+n.width/2); minY=Math.min(minY,n.y-n.height/2); maxY=Math.max(maxY,n.y+n.height/2); });
  if (!isFinite(minX)) { minX=-500; maxX=500; minY=-500; maxY=500; }
  var ww = maxX-minX, wh = maxY-minY;
  var pad = 80;
  var s = Math.min((window.innerWidth-pad*2)/ww, ((window.innerHeight-44)-pad*2)/wh, 2);
  var cx = (minX+maxX)/2, cy = (minY+maxY)/2;
  camera.targetScale = Math.max(MIN_SCALE, s);
  camera.targetX = window.innerWidth/2 - cx * camera.targetScale;
  camera.targetY = (window.innerHeight-44)/2 - cy * camera.targetScale;
  showZoomIndicator();
};

function toggleVideoPlay(node) {
  node.playing = !node.playing;
  var el = document.querySelector('.world-node[data-id="'+node.id+'"]');
  if (el) {
    var body = el.querySelector('.media-body');
    if (!body) { buildNodeContent(node, el); body = el.querySelector('.media-body'); }
    if (body) {
      if (node.playing) {
        body.innerHTML = '<video src="'+escAttr(node.src)+'" autoplay loop controls style="width:100%;height:100%;object-fit:contain;"></video>';
        setTimeout(function() { var v=body.querySelector('video'); if(v) v.play().catch(function(){}); }, 50);
      } else {
        body.innerHTML = '<div class="play-btn" onclick="event.stopPropagation();window._toggleVideo(\''+node.id+'\')">▶</div>';
      }
    }
  }
}
window.showStyleManagerModal = showStyleManagerModal;
window._toggleVideo = function(id) {
  var hit = findMediaById(id);
  if (hit) toggleVideoPlay(hit.node);
};
window._retryGen = function(id, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  var hit = findMediaById(id);
  if (!hit || hit.node.genState !== 'failed') return;
  // 找到上游连线（帧节点）
  var inConn = connections.filter(function(c){return c.targetId===id;});
  if (!inConn.length) return;
  var frameNode = findMediaById(inConn[0].sourceId);
  if (!frameNode) return;
  // 重试：删除旧占位节点，重新发起
  var keyframeId = hit.node.genFrameKey;
  var size = hit.node.genSize;
  var refFrameNodeId = null; // 简单重试不带参考帧
  deleteNode(id);
  console.log('[重试生图] 删除旧节点 '+id+', 重新生成 镜号='+keyframeId);
  executeGenImage(frameNode.node, keyframeId, refFrameNodeId, size);
};

// ==================== MD5 工具函数 ====================
function md5hex(buf) {
  var n = buf.length;
  var blockCount = ((n + 8) >>> 6) + 1;
  var words = new Array(blockCount << 4);
  for (var i = 0; i < words.length; i++) words[i] = 0;
  for (var i = 0; i < n; i++) words[i >>> 2] |= (buf[i] & 0xFF) << ((i & 3) << 3);
  words[i >>> 2] |= 0x80 << ((i & 3) << 3);
  words[words.length - 2] = n * 8;
  var a = 0x67452301, b = 0xEFCDAB89, c = 0x98BADCFE, d = 0x10325476;
  var S = [7,12,17,22,5,9,14,20,4,11,16,23,6,10,15,21];
  var K = [0xD76AA478,0xE8C7B756,0x242070DB,0xC1BDCEEE,0xF57C0FAF,0x4787C62A,0xA8304613,0xFD469501,0x698098D8,0x8B44F7AF,0xFFFF5BB1,0x895CD7BE,0x6B901122,0xFD987193,0xA679438E,0x49B40821,0xF61E2562,0xC040B340,0x265E5A51,0xE9B6C7AA,0xD62F105D,0x02441453,0xD8A1E681,0xE7D3FBC8,0x21E1CDE6,0xC33707D6,0xF4D50D87,0x455A14ED,0xA9E3E905,0xFCEFA3F8,0x676F02D9,0x8D2A4C8A,0xFFFA3942,0x8771F681,0x6D9D6122,0xFDE5380C,0xA4BEEA44,0x4BDECFA9,0xF6BB4B60,0xBEBFBC70,0x289B7EC6,0xEAA127FA,0xD4EF3085,0x04881D05,0xD9D4D039,0xE6DB99E5,0x1FA27CF8,0xC4AC5665,0xF4292244,0x432AFF97,0xAB9423A7,0xFC93A039,0x655B59C3,0x8F0CCC92,0xFFEFF47D,0x85845DD1,0x6FA87E4F,0xFE2CE6E0,0xA3014314,0x4E0811A1,0xF7537E82,0xBD3AF235,0x2AD7D2BB,0xEB86D391];
  function F(x,y,z){return(x&y)|(~x&z);}
  function G(x,y,z){return(x&z)|(y&~z);}
  function H(x,y,z){return x^y^z;}
  function I(x,y,z){return y^(x|~z);}
  for (var j = 0; j < words.length; j += 16) {
    var A = a, B = b, C = c, D = d;
    for (var k = 0; k < 64; k++) {
      var f, g;
      if (k < 16) { f = F(B,C,D); g = k; }
      else if (k < 32) { f = G(B,C,D); g = (5*k+1)%16; }
      else if (k < 48) { f = H(B,C,D); g = (3*k+5)%16; }
      else { f = I(B,C,D); g = (7*k)%16; }
      var t = D;
      D = C; C = B;
      B = (B + ((A + f + K[k] + words[j+g]) | 0)) | 0;
      B = ((B << S[(k>>>2)*4 + (k&3)]) | (B >>> (32 - S[(k>>>2)*4 + (k&3)]))) | 0;
      B = (B + C) | 0;
      A = t;
    }
    a = (a + A) | 0; b = (b + B) | 0; c = (c + C) | 0; d = (d + D) | 0;
  }
  function toHex(v) { var h = (v >>> 0).toString(16); while (h.length < 8) h = '0' + h; return h; }
  return toHex(a) + toHex(b) + toHex(c) + toHex(d);
}

function computeFileMD5(file, cb) {
  var reader = new FileReader();
  reader.onload = function() { cb(md5hex(new Uint8Array(reader.result))); };
  reader.onerror = function() { cb(null); };
  reader.readAsArrayBuffer(file);
}

// ==================== 资产库面板 ====================
var assetPanelOpen = false;
var assetGroupsCollapsed = {};

function toggleAssetPanel() {
  assetPanelOpen = !assetPanelOpen;
  var panel = document.getElementById('assetPanel');
  var btn = document.getElementById('btnToggleAssets');
  if (assetPanelOpen) { panel.classList.add('open'); btn.classList.add('active'); loadAssetPanel(); }
  else { panel.classList.remove('open'); btn.classList.remove('active'); }
}

window.toggleAssetPanel = toggleAssetPanel;

function loadAssetPanel() {
  var body = document.getElementById('assetPanelBody');
  body.innerHTML = '<div class="ap-loading">加载中...</div>';
  api('GET','/assets?limit=500').then(function(list) {
    if (!list || !list.length) { body.innerHTML = '<div class="ap-empty">暂无资产<br><span style="font-size:11px;color:var(--text2)">AI生成或上传的图片将显示在这里</span></div>'; return; }
    // 客户端时间分组
    var now = new Date();
    var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var yesterdayStart = new Date(todayStart.getTime() - 86400000);
    var weekStart = new Date(todayStart.getTime() - 7*86400000);
    var monthStart = new Date(todayStart.getTime() - 30*86400000);
    var labels = { today:'今天', yesterday:'昨天', week:'本周', month:'本月', older:'更早' };
    list.forEach(function(a) {
      var d = new Date(a.created_at+'Z');
      if (d >= todayStart) a._period = 'today';
      else if (d >= yesterdayStart) a._period = 'yesterday';
      else if (d >= weekStart) a._period = 'week';
      else if (d >= monthStart) a._period = 'month';
      else a._period = 'older';
    });
    renderAssetGroups(list, labels, body);
  });
}

function renderAssetGroups(assets, labels, body) {
  if (!assets.length) { body.innerHTML = '<div class="ap-empty">暂无资产<br><span style="font-size:11px;color:var(--text2)">AI生成或上传的图片将显示在这里</span></div>'; return; }
  var groups = { today:[], yesterday:[], week:[], month:[], older:[] };
  assets.forEach(function(a) { if (groups[a._period]) groups[a._period].push(a); });
  var html = '';
  ['today','yesterday','week','month','older'].forEach(function(p) {
    var list = groups[p];
    if (!list || !list.length) return;
    var collapsed = assetGroupsCollapsed[p];
    html += '<div class="asset-group">';
    html += '<div class="asset-group-header" onclick="window._toggleAssetGroup(\''+p+'\')">';
    html += '<span class="arrow'+(collapsed?'':' open')+'">▶</span> ';
    html += labels[p] + ' (' + list.length + ')</div>';
    if (!collapsed) {
      html += '<div class="asset-group-grid">';
      list.forEach(function(a) {
        html += '<div class="asset-thumb" onclick="window._previewAsset(\''+a.id+'\',\''+escAttr(a.url)+'\',\''+escAttr(a.stored_name||'')+'\')">';
        html += '<img src="'+escAttr(a.url)+'" loading="lazy">';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  body.innerHTML = html;
}

window._toggleAssetGroup = function(p) {
  assetGroupsCollapsed[p] = !assetGroupsCollapsed[p];
  loadAssetPanel();
};

window._previewAsset = function(id, url, name) {
  var ov = document.getElementById('assetPreview');
  var box = document.getElementById('assetPreviewBox');
  box.innerHTML = '<img src="'+escAttr(url)+'"><div class="ap-actions">'+
    '<button onclick="window._downloadAsset(\''+escAttr(url)+'\',\''+escAttr(name||'image')+'\')">⬇️ 下载</button>'+
    '<button class="ap-del" onclick="window._deleteAsset(\''+id+'\',\''+escAttr(url)+'\')">🗑️ 删除</button>'+
    '</div>';
  ov.classList.add('show');
};

window.closeAssetPreview = function() {
  document.getElementById('assetPreview').classList.remove('show');
};

window._downloadAsset = function(url, name) {
  var a = document.createElement('a'); a.href = url; a.download = name; a.click();
};

window._deleteAsset = function(id, url) {
  showConfirm('确定删除此资产吗？对应画布中的图片也会被移除。', function(ok) {
    if (!ok) return;
    api('DELETE','/assets/'+id).then(function(r) {
      if (r && r.ok) {
        // 1) 服务端返回的被删节点
        if (r.removedNodeIds && r.removedNodeIds.length) {
          r.removedNodeIds.forEach(function(nid) { deleteNode(nid); });
        }
        // 2) 前端本地兜底：按 URL 遍历所有节点，移除 src 匹配的
        if (url) {
          mediaNodes.forEach(function(n) {
            if (n.src === url) { console.log('[删资产] 本地移除节点 '+n.id+' src='+url); deleteNode(n.id); }
          });
        }
        toast('已删除'+(r.removedFromProjects?'，画布中 '+r.removedFromProjects+' 个节点已移除':''),'');
        closeAssetPreview(); loadAssetPanel();
      } else {
        toast('删除失败','error');
      }
    }).catch(function(e) {
      toast('删除失败: '+(e&&e.message||'未知'),'error');
    });
  });
};

function uploadToAssets(file) {
  if (!file) {
    var inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = function(e) { var f = e.target.files[0]; if (f) uploadToAssets(f); };
    inp.click(); return;
  }
  computeFileMD5(file, function(md5) {
    if (!md5) { toast('读取文件失败','error'); return; }
    api('GET','/assets/check-md5?md5='+md5).then(function(r) {
      if (r && r.exists) { toast('图片已存在于资产库','warn'); loadAssetPanel(); return; }
      var fd = new FormData();
      fd.append('file', file);
      fd.append('md5', md5);
      var xhr = new XMLHttpRequest();
      xhr.open('POST', API + '/assets');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onload = function() {
        if (xhr.status === 401) { localStorage.removeItem('canvas_token'); window.location.replace('/login.html'); return; }
        toast('上传成功',''); loadAssetPanel();
      };
      xhr.send(fd);
    });
  });
}

window.uploadToAssets = uploadToAssets;

// ==================== 图片放大预览 ====================
function showImagePreview(url, name) {
  console.log('[放大查看] 打开预览 url='+url+' name='+(name||''));
  var ov = document.getElementById('imgZoomPreview');
  var img = document.getElementById('imgZoomPreviewImg');
  var btn = document.getElementById('btnZoomDownload');
  img.src = url;
  btn.onclick = function() { downloadImage(url, name); };
  ov.classList.add('show');
  ov._zoomUrl = url;
  ov._zoomName = name;
}

function closeImagePreview() {
  console.log('[放大查看] 关闭预览');
  document.getElementById('imgZoomPreview').classList.remove('show');
}

function downloadImage(url, name) {
  console.log('[放大查看] 下载 url='+url+' name='+(name||''));
  var a = document.createElement('a'); a.href = url; a.download = name || 'image.png'; a.click();
}

window.closeImagePreview = closeImagePreview;

// ESC 关闭
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var ov = document.getElementById('imgZoomPreview');
    if (ov.classList.contains('show')) closeImagePreview();
  }
});

// 从资产库选择图片放入节点
window._pickAssetForNode = function(url) {
  if (window._imgSrcNodeId) {
    var hit = findMediaById(window._imgSrcNodeId);
    if (hit && hit.node) {
      hit.node.src = url; hit.node.state = 'loaded';
      var el = document.querySelector('.world-node[data-id="'+window._imgSrcNodeId+'"]');
      if (el) buildNodeContent(hit.node, el);
      autoSave(); toast('图片已设置','');
    }
  }
  closeImgSrcDialog();
};

// ==================== 图片来源选择弹窗 ====================
window._imgSrcNodeId = null;

window.showImageSourceDialog = function(nodeId) {
  window._imgSrcNodeId = nodeId;
  document.getElementById('imgSrcDialog').classList.add('show');
  loadImgSrcAssets();
};

function closeImgSrcDialog() {
  document.getElementById('imgSrcDialog').classList.remove('show');
  window._imgSrcNodeId = null;
}

window.closeImgSrcDialog = closeImgSrcDialog;

function loadImgSrcAssets() {
  var grid = document.getElementById('isdAssetGrid');
  grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);font-size:12px;">加载中...</div>';
  api('GET','/assets?limit=500').then(function(list) {
    if (!list || !list.length) { grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text2);font-size:12px;">暂无资产</div>'; return; }
    var html = '<div class="isd-asset-grid">';
    list.forEach(function(a) {
      html += '<div class="isd-asset-thumb" onclick="window._pickAssetForNode(\''+escAttr(a.url)+'\')">';
      html += '<img src="'+escAttr(a.url)+'" loading="lazy">';
      var d = new Date(a.created_at+'Z');
      html += '<div class="isd-time">'+d.toLocaleDateString('zh-CN')+'</div>';
      html += '</div>';
    });
    html += '</div>';
    grid.innerHTML = html;
  });
}

// 核心：上传文件到资产库（点击和拖拽共用）
function uploadFileForNode(file) {
  computeFileMD5(file, function(md5) {
    if (!md5) { toast('读取文件失败','error'); return; }
    api('GET','/assets/check-md5?md5='+md5).then(function(r) {
      if (r && r.exists) {
        toast('图片已存在于资产库，直接使用','warn');
        if (window._imgSrcNodeId) { window._pickAssetForNode(r.url); }
        loadImgSrcAssets();
        return;
      }
      var fd = new FormData();
      fd.append('file', file);
      fd.append('md5', md5);
      var xhr = new XMLHttpRequest();
      xhr.open('POST', API + '/assets');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.onload = function() {
        if (xhr.status === 401) { localStorage.removeItem('canvas_token'); window.location.replace('/login.html'); return; }
        try { var d = JSON.parse(xhr.responseText); if (d && d.url) { window._pickAssetForNode(d.url); } } catch(ex) {}
      };
      xhr.send(fd);
    });
  });
}

function uploadFromImgSrcDialog() {
  var inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = function(e) { var f = e.target.files[0]; if (f) uploadFileForNode(f); };
  inp.click();
}

// 拖拽上传
function handleAssetDrop(e) {
  e.preventDefault();
  e.target.classList.remove('drag-over');
  var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if (f && f.type.match(/^image\//)) { uploadFileForNode(f); }
  else { toast('请拖入图片文件','error'); }
}

window.uploadFromImgSrcDialog = uploadFromImgSrcDialog;
window.handleAssetDrop = handleAssetDrop;

})();

function tryExtractJson(text) {
  if (!text) return null;
  // 1) 直接解析
  try { return JSON.parse(text); } catch(e) {}
  // 2) 提取 ```json ... ``` 代码块
  var m = text.match(/```json\s*([\s\S]*?)```/);
  if (m) { try { return JSON.parse(m[1]); } catch(e) {} }
  // 3) 提取第一个完整 JSON 对象/数组
  var depth = 0, start = -1, i = 0;
  while (i < text.length) {
    var ch = text[i];
    if (ch === '{' || ch === '[') { if (depth === 0) start = i; depth++; }
    else if (ch === '}' || ch === ']') { depth--; if (depth === 0 && start >= 0) { try { return JSON.parse(text.substring(start, i + 1)); } catch(e) { break; } } }
    i++;
  }
  return null;
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function logout() {
  showConfirm('确定要退出登录吗？', function(ok) {
    if (ok) { localStorage.removeItem('canvas_token'); localStorage.removeItem('canvas_username'); window.location.replace('/login.html'); }
  });
}
