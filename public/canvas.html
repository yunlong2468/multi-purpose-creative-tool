<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无限画布</title>
<style>
:root { --bg:#0D0D0D; --panel:#171717; --text:#fff; --text2:#A1A1AA; --accent:#05A3C5; --danger:#F53F3F; --border:rgba(255,255,255,0.08); --radius:12px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; overflow:hidden; user-select:none; -webkit-user-select:none; height:100vh; }
/* contentEditable 和 textarea 恢复文本选择 */
[contenteditable], textarea, input { user-select:text; -webkit-user-select:text; }
/* 顶栏 */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:0 16px; height:44px; background:var(--panel); border-bottom:0.5px solid var(--border); position:relative; z-index:100; }
.topbar .left { display:flex; align-items:center; gap:10px; }
.topbar .left .project-name { font-size:14px; font-weight:600; cursor:pointer; }
.topbar .left .project-name:hover { color:var(--accent); }
.topbar .left .sep { color:var(--text2); font-size:12px; }
.topbar .left .zoom-text { font-size:11px; color:var(--text2); min-width:44px; text-align:center; }
.topbar .tools { display:flex; gap:2px; }
.topbar .tools button { padding:6px 10px; border-radius:6px; border:none; cursor:pointer; font-size:12px; font-family:inherit; background:transparent; color:var(--text2); transition:all 0.15s; white-space:nowrap; }
.topbar .tools button:hover { background:var(--border); color:var(--text); }
.topbar .tools button.active { background:rgba(5,163,197,0.15); color:var(--accent); }
.topbar .right { display:flex; align-items:center; gap:10px; }
.topbar .right a { color:var(--text2); text-decoration:none; font-size:12px; }
.topbar .right a:hover { color:var(--text); }
.topbar .right button { padding:5px 14px; border-radius:6px; border:0.5px solid rgba(245,63,63,0.3); background:rgba(245,63,63,0.1); color:var(--danger); cursor:pointer; font-size:11px; font-family:inherit; }
/* 视口 */
#viewport { position:fixed; top:44px; left:48px; right:0; bottom:0; overflow:hidden; background:var(--bg); cursor:default; }
#viewport.grabbing { cursor:grabbing; }
/* 世界 */
#world { position:absolute; top:0; left:0; width:50000px; height:50000px; transform-origin:0 0; will-change:transform;
  background-image:radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size:40px 40px; background-position:0 0; }
/* SVG 连线层 */
#connections-svg { position:absolute; top:0; left:0; width:1px; height:1px; overflow:visible; pointer-events:none; z-index:0; }
#connections-svg path { fill:none; stroke:rgba(255,255,255,0.2); stroke-width:2; pointer-events:stroke; cursor:pointer; }
#connections-svg path:hover { stroke:var(--accent); stroke-width:3; }
#connections-svg path.selected { stroke:var(--accent); stroke-width:3; }
#connections-svg .conn-dragging { stroke:rgba(5,163,197,0.5); stroke-width:2; stroke-dasharray:6 4; }
/* 节点 */
.world-node { position:absolute; transform:translate(-50%,-50%); cursor:pointer; border-radius:10px; transition:box-shadow 0.15s; z-index:1; }
.world-node.selected { box-shadow:0 0 0 2px var(--accent); }
.node-empty { background:rgba(255,255,255,0.03); border:1px dashed rgba(255,255,255,0.15); display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text2); font-size:13px; }
.node-empty .drop-hint { pointer-events:none; text-align:center; }
.node-image { background:var(--panel); border:0.5px solid var(--border); overflow:hidden; display:flex; flex-direction:column; }
.node-image .media-body { flex:1; position:relative; overflow:hidden; }
.node-image img { width:100%; height:100%; object-fit:contain; pointer-events:none; }
.node-image .replace-hint { position:absolute; bottom:0; left:0; right:0; height:24px; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; font-size:10px; color:rgba(255,255,255,0.5); opacity:0; transition:opacity 0.2s; }
.node-image:hover .replace-hint { opacity:1; }
.node-video { background:var(--panel); border:0.5px solid var(--border); overflow:hidden; display:flex; flex-direction:column; }
.node-video .media-body { flex:1; position:relative; overflow:hidden; }
.node-video video { width:100%; height:100%; object-fit:contain; }
.node-video .play-btn { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:36px; color:rgba(255,255,255,0.7); cursor:pointer; }
.node-video .play-btn:hover { color:#fff; }
/* 媒体节点标题栏 */
.media-title { height:24px; display:flex; align-items:center; padding:0 8px; font-size:11px; font-weight:600; flex-shrink:0; gap:4px; }
.node-image .media-title { background:rgba(126,200,227,0.1); color:#7EC8E3; }
.node-video .media-title { background:rgba(245,166,35,0.1); color:#F5A623; }
.node-empty .media-title { background:rgba(255,255,255,0.03); color:var(--text2); }
.media-title-locked { cursor:default; opacity:0.7; }
/* select下拉选项暗黑适配 */
select option { background:#171717; color:#e0e0e0; }
/* 风格网格 */
.style-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(170px, 1fr)); gap:12px; }
.style-grid-card { background:var(--panel); transition:box-shadow 0.15s; }
.style-grid-card:hover { box-shadow:0 0 0 1px var(--accent); }
.style-cover { position:relative; }
/* 脚本节点 */
.node-script { background:var(--panel); border:0.5px solid var(--border); overflow:hidden; display:flex; flex-direction:column; }
.node-script .script-title { height:28px; background:rgba(5,163,197,0.1); display:flex; align-items:center; padding:0 10px; font-size:12px; font-weight:700; color:#05DFF6; flex-shrink:0; }
.node-script .script-body { flex:1; display:flex; flex-direction:column; padding:8px 10px; gap:6px; }
.node-script .script-input { flex:1; background:rgba(255,255,255,0.04); border:0.5px solid rgba(255,255,255,0.1); border-radius:6px; color:#e0e0e0; font-size:12px; font-family:inherit; padding:6px 8px; resize:none; outline:none; }
.node-script .script-input:focus { border-color:var(--accent); }
.node-script .script-output { flex:1; background:rgba(0,0,0,0.3); border:0.5px solid rgba(255,255,255,0.06); border-radius:6px; color:#e0e0e0; font-size:11px; font-family:inherit; padding:6px 8px; resize:none; outline:none; overflow-y:auto; white-space:pre-wrap; }
.node-script .script-output:focus { border-color:var(--accent); }
.node-script .script-row { display:flex; gap:6px; align-items:center; flex-shrink:0; }
.node-script .script-row button { padding:4px 12px; border-radius:5px; border:0.5px solid var(--border); background:rgba(255,255,255,0.05); color:var(--text2); cursor:pointer; font-size:11px; font-family:inherit; transition:all 0.15s; }
.node-script .script-row button:hover { background:var(--border); color:var(--text); }
.node-script .script-row .btn-run { background:rgba(5,163,197,0.2); color:#05DFF6; border-color:rgba(5,163,197,0.3); }
.node-script .script-row .btn-cancel { background:rgba(245,63,63,0.15); color:#F53F3F; border-color:rgba(245,63,63,0.25); }
.node-script .script-row .btn-cancel:hover { background:rgba(245,63,63,0.25); color:#ff6b6b; }
/* 帧节点 */
.node-frame { background:var(--panel); border:0.5px solid var(--border); overflow:hidden; display:flex; flex-direction:column; }
.node-frame .frame-title { height:28px; background:rgba(236,124,195,0.08); display:flex; align-items:center; padding:0 10px; font-size:12px; font-weight:700; color:#EC7CC3; flex-shrink:0; justify-content:space-between; }
.node-frame .frame-body { flex:1; padding:20px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.15); font-size:13px; }
.node-frame .frame-toolbar { display:flex; gap:4px; padding:6px 10px; border-top:0.5px solid var(--border); flex-shrink:0; }
.node-frame .frame-toolbar button { padding:3px 10px; border-radius:5px; border:0.5px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text2); cursor:pointer; font-size:10px; font-family:inherit; }
.node-frame .frame-toolbar button:hover { background:var(--border); color:var(--text); }
.node-frame .frame-toolbar .btn-gen { background:rgba(236,124,195,0.15); color:#EC7CC3; border-color:rgba(236,124,195,0.2); }
.node-frame .frame-toolbar .btn-cancel { background:rgba(245,63,63,0.15); color:#F53F3F; border-color:rgba(245,63,63,0.25); }
.node-frame .frame-toolbar .btn-cancel:hover { background:rgba(245,63,63,0.25); color:#ff6b6b; }
.node-frame .frame-toolbar .btn-gen-img { background:rgba(245,166,35,0.12); color:#F5A623; border-color:rgba(245,166,35,0.2); }
.node-frame .frame-toolbar .btn-gen-img:hover { background:rgba(245,166,35,0.25); color:#ffc44d; }
.node-frame .frame-toolbar .btn-snapshot { background:rgba(255,255,255,0.03); color:var(--text2); border-color:rgba(255,255,255,0.08); font-size:11px; padding:3px 8px; }
.node-frame .frame-toolbar .btn-snapshot:hover { background:rgba(255,255,255,0.08); color:var(--text); }
.node-frame .frame-error { flex:1; padding:12px 16px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; overflow-y:auto; }
.node-frame .frame-error-icon { font-size:28px; }
.node-frame .frame-error-msg { font-size:12px; color:#F53F3F; text-align:center; line-height:1.5; }
/* 帧表格预览 */
.frame-table-preview { flex:1; overflow:auto; padding:4px; }
.frame-table-preview table { border-collapse:collapse; font-size:9px; width:100%; }
.frame-table-preview th { padding:3px 4px; text-align:left; color:#A1A1AA; border-bottom:0.5px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.03); position:sticky; top:0; }
.frame-table-preview td { padding:2px 4px; color:#e0e0e0; border-bottom:0.5px solid rgba(255,255,255,0.03); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
/* 连接点 */
.conn-point { position:absolute; width:14px; height:14px; border-radius:50%; background:var(--panel); border:1.5px solid rgba(255,255,255,0.3); transform:translate(-50%,-50%); cursor:crosshair; z-index:10; opacity:0; transition:opacity 0.15s; }
.world-node:hover .conn-point, .world-node.selected .conn-point { opacity:1; }
.conn-point:hover { background:var(--accent); border-color:var(--accent); }
.conn-point.left { left:0; top:50%; }
.conn-point.right { right:0; top:50%; transform:translate(50%,-50%); }
/* 便签 */
.world-note { position:absolute; transform:translate(-50%,-50%); cursor:move; z-index:1; padding:8px; display:flex; }
.world-note .note-card { flex:1; min-width:80px; min-height:60px; padding:14px 18px 22px; border-radius:10px; font-size:14px; line-height:1.6; outline:none; word-break:break-word; background:#171717; border:1px solid rgba(255,255,255,0.08); box-shadow:0 4px 24px rgba(0,0,0,0.5); transition:box-shadow 0.2s, border-color 0.15s; cursor:text; position:relative; overflow-y:auto; direction:rtl; text-align:left; }
.world-note.selected .note-card { box-shadow:0 0 0 2px var(--accent); border-color:var(--accent); }
.world-note .note-card:focus { box-shadow:0 0 0 2px var(--accent); border-color:var(--accent); }
.world-note .note-card .note-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; height:100%; color:rgba(255,255,255,0.12); pointer-events:none; position:absolute; inset:0; direction:ltr; }
.world-note .note-resize-wrap { position:absolute; right:6px; bottom:6px; width:22px; height:22px; cursor:nwse-resize; z-index:3; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; color:rgba(255,255,255,0.2); border-radius:4px; }
.world-note .note-resize-wrap:hover { color:rgba(255,255,255,0.7); background:rgba(255,255,255,0.08); }
.world-note:hover .note-resize-wrap { opacity:1; }
.world-note .note-resize-wrap svg { display:block; }
.world-note .note-card::-webkit-scrollbar { width:4px; }
.world-note .note-card::-webkit-scrollbar-track { background:transparent; }
.world-note .note-card::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
.world-note .note-card::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.18); }
.world-note .note-card { scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.08) transparent; }
/* 节点类型标签 */
.node-type-tag { position:absolute; top:3px; left:6px; z-index:6; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:600; color:#fff; background:rgba(0,0,0,0.55); backdrop-filter:blur(4px); pointer-events:none; white-space:nowrap; }
.node-type-tag.script { color:#05DFF6; }
.node-type-tag.frame  { color:#EC7CC3; }
.node-type-tag.image  { color:#7EC8E3; }
.node-type-tag.video  { color:#F5A623; }
.node-type-tag.empty  { color:var(--text2); }
/* 下拉菜单 */
.dropdown { position:fixed; z-index:500; display:none; background:var(--panel); border:0.5px solid var(--border); border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,0.6); max-height:240px; overflow-y:auto; min-width:200px; }
.dropdown .item { padding:8px 14px; cursor:pointer; font-size:13px; color:var(--text2); border-bottom:0.5px solid rgba(255,255,255,0.04); }
.dropdown .item:hover { background:rgba(255,255,255,0.06); color:var(--text); }
/* 右键菜单 */
.context-menu { position:fixed; z-index:500; display:none; background:var(--panel); border:0.5px solid var(--border); border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,0.6); min-width:160px; padding:4px; }
.context-menu .item { padding:8px 14px; cursor:pointer; font-size:12px; color:var(--text2); border-radius:6px; }
.context-menu .item:hover { background:rgba(255,255,255,0.06); color:var(--text); }
.context-menu .item.danger { color:var(--danger); }
/* 缩放指示器 */
.zoom-indicator { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); color:var(--text); padding:6px 16px; border-radius:8px; font-size:12px; pointer-events:none; z-index:200; opacity:0; transition:opacity 0.3s; }
.zoom-indicator.show { opacity:1; }
/* 便签格式栏 */
.note-format-bar { position:fixed; top:50px; left:50%; transform:translateX(-50%); z-index:450; background:var(--panel); border:0.5px solid var(--border); border-radius:8px; padding:4px 8px; display:none; align-items:center; gap:4px; box-shadow:0 4px 16px rgba(0,0,0,0.5); }
.note-format-bar.show { display:flex; }
.note-format-bar button { padding:4px 8px; border-radius:4px; border:none; background:transparent; color:var(--text2); cursor:pointer; font-size:12px; font-family:inherit; font-weight:600; min-width:24px; }
.note-format-bar button:hover { background:var(--border); color:var(--text); }
.note-format-bar button.active { background:rgba(5,163,197,0.15); color:var(--accent); }
.note-format-bar .sep { width:1px; height:16px; background:var(--border); margin:0 2px; }
.note-format-bar input[type="number"] { padding:2px 4px; background:#0a0a0a; border:0.5px solid var(--border); border-radius:4px; color:var(--text); font-size:11px; font-family:inherit; text-align:center; outline:none; }
.note-format-bar input[type="color"] { width:20px; height:20px; padding:0; border:none; border-radius:4px; cursor:pointer; background:transparent; }
.note-format-bar select { padding:2px 4px; background:#0a0a0a; border:0.5px solid var(--border); border-radius:4px; color:var(--text); font-size:11px; font-family:inherit; outline:none; }
.note-format-bar label { cursor:pointer; display:flex; }
/* 框选 */
.box-select { position:fixed; border:2px dashed #05DFF6; background:rgba(5,223,246,0.1); pointer-events:none; z-index:500; display:none; }
/* 帧表格模态 */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:600; display:flex; align-items:center; justify-content:center; }
.modal-overlay .modal-box { background:#171717; border:0.5px solid rgba(255,255,255,0.1); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; position:relative; }
.modal-box .modal-header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:0.5px solid rgba(255,255,255,0.08); }
.modal-box .modal-body { overflow:auto; padding:8px; flex:1; }
.modal-box .modal-body td[contenteditable] { padding:4px 6px; color:#e0e0e0; border:0.5px solid rgba(255,255,255,0.08); font-size:10px; min-width:50px; white-space:nowrap; cursor:text; }
.modal-box .modal-body td[contenteditable]:focus { background:rgba(5,163,197,0.15); outline:1px solid var(--accent); }
.modal-box .modal-body td[contenteditable]:hover { background:rgba(255,255,255,0.03); }
/* 镜号列冻结 */
.modal-box .modal-body .sticky-td { position:sticky; left:0; z-index:2; background:#171717; }
.modal-box .modal-body thead .sticky-th { position:sticky; top:0; left:0; z-index:3; background:#1e1e1e; }
.modal-box .modal-footer { padding:8px 16px; border-top:0.5px solid rgba(255,255,255,0.08); font-size:10px; color:var(--text2); flex-shrink:0; }
/* 模态标题栏按钮 */
.modal-btn-font, .modal-btn-size { padding:2px 6px; border-radius:4px; border:0.5px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:var(--text2); cursor:pointer; font-size:11px; font-family:inherit; line-height:1.3; }
.modal-btn-font:hover, .modal-btn-size:hover { background:rgba(255,255,255,0.12); color:var(--text); }
/* 自定义拖拽手柄 */
.modal-resize-handle { position:absolute; right:0; bottom:0; width:20px; height:20px; cursor:nwse-resize; z-index:10;
  background:linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.15) 60%, transparent 60%),
             linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.15) 70%, transparent 70%);
  border-radius:0 0 12px 0; }
.modal-resize-handle:hover { background:linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0.3) 60%, transparent 60%),
                                         linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0.3) 70%, transparent 70%); }
/* 节点进度条 */
.node-progress { flex-shrink:0; height:22px; background:rgba(0,0,0,0.6); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; }
.node-progress .progress-track { width:calc(100% - 16px); height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
.node-progress .progress-fill { height:100%; width:40%; background:linear-gradient(90deg, transparent, var(--accent), #05DFF6, var(--accent), transparent); background-size:200% 100%; animation:progressFlow 1.6s ease-in-out infinite; border-radius:2px; }
@keyframes progressFlow {
  0% { transform:translateX(-100%); }
  100% { transform:translateX(350%); }
}
.node-progress .progress-label { font-size:9px; color:rgba(255,255,255,0.5); line-height:1; pointer-events:none; }
/* 左侧侧边栏 */
#leftSidebar { position:fixed; left:0; top:44px; bottom:0; width:48px; background:var(--panel); border-right:0.5px solid var(--border); z-index:200; display:flex; flex-direction:column; align-items:center; padding-top:8px; }
#leftSidebar button { width:36px; height:36px; border-radius:8px; border:none; background:transparent; color:var(--text2); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; position:relative; }
#leftSidebar button:hover, #leftSidebar button.active { background:rgba(5,163,197,0.12); color:var(--accent); }
#leftSidebar button svg { width:20px; height:20px; }
#leftSidebar .sidebar-label { font-size:9px; color:var(--text2); text-align:center; margin-top:2px; }
/* 资产库面板 */
#assetPanel { position:fixed; left:48px; top:44px; bottom:0; width:320px; background:var(--panel); border-right:0.5px solid var(--border); z-index:199; transform:translateX(-100%); transition:transform 0.2s ease; display:flex; flex-direction:column; overflow:hidden; }
#assetPanel.open { transform:translateX(0); }
#assetPanel .ap-header { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-bottom:0.5px solid var(--border); flex-shrink:0; }
#assetPanel .ap-header h3 { font-size:14px; }
#assetPanel .ap-header button { padding:4px 10px; border-radius:6px; border:0.5px solid var(--border); background:rgba(255,255,255,0.05); color:var(--text2); cursor:pointer; font-size:11px; font-family:inherit; }
#assetPanel .ap-header button:hover { background:rgba(255,255,255,0.1); color:var(--text); }
#assetPanel .ap-body { flex:1; overflow-y:auto; padding:8px; }
#assetPanel .ap-body::-webkit-scrollbar { width:4px; }
#assetPanel .ap-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
/* 资产时间分组 */
.asset-group { margin-bottom:12px; }
.asset-group-header { display:flex; align-items:center; gap:4px; padding:4px 6px; cursor:pointer; border-radius:6px; font-size:12px; color:var(--text2); }
.asset-group-header:hover { background:rgba(255,255,255,0.04); }
.asset-group-header .arrow { font-size:10px; transition:transform 0.15s; }
.asset-group-header .arrow.open { transform:rotate(90deg); }
.asset-group-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:4px; padding:4px 0; }

  t.textContent = msg;
  t.style.background = type==='error'?'rgba(245,63,63,0.9)':type==='warn'?'rgba(245,166,35,0.9)':'rgba(0,180,100,0.9)';
  t.style.color = '#fff'; t.style.opacity = '1';
  if (t._timer) clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.style.opacity = '0'; }, 2500);
}
function showConfirm(msg, cb) {
  var ov = document.createElement('div');
  ov.className = 'modal-overlay'; ov.style.cssText = 'z-index:800;';
  ov.innerHTML = '<div class="modal-box" style="width:380px;height:auto;padding:24px;">'+
    '<div style="font-size:14px;margin-bottom:16px;line-height:1.5;">'+escHtml(msg)+'</div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;">'+
      '<button style="padding:8px 18px;border-radius:6px;border:0.5px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text2);cursor:pointer;font-family:inherit;" onclick="this.closest(\'.modal-overlay\').remove();window._cfmCb(false)">取消</button>'+
      '<button style="padding:8px 18px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;" onclick="this.closest(\'.modal-overlay\').remove();window._cfmCb(true)">确定</button>'+
    '</div></div>';
  document.body.appendChild(ov);
  window._cfmCb = cb;
  ov.addEventListener('click', function(e) { if (e.target===ov) { ov.remove(); cb(false); } });
}
window.showConfirm = showConfirm;
function showPrompt(msg, defVal, cb) {
  var ov = document.createElement('div');
  ov.className = 'modal-overlay'; ov.style.cssText = 'z-index:800;';
  var val = defVal || '';
  ov.innerHTML = '<div class="modal-box" style="width:420px;height:auto;padding:24px;">'+
    '<div style="font-size:14px;margin-bottom:10px;">'+escHtml(msg)+'</div>'+
    '<input id="_pmtInput" style="width:100%;padding:8px 12px;background:rgba(255,255,255,0.04);border:0.5px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;margin-bottom:14px;" value="'+escAttr(val)+'">'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;">'+
      '<button style="padding:8px 18px;border-radius:6px;border:0.5px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text2);cursor:pointer;font-family:inherit;" onclick="this.closest(\'.modal-overlay\').remove();window._pmtCb(null)">取消</button>'+
      '<button style="padding:8px 18px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;" onclick="var v=document.getElementById(\'_pmtInput\').value;this.closest(\'.modal-overlay\').remove();window._pmtCb(v)">确定</button>'+
    '</div></div>';
  document.body.appendChild(ov);
  window._pmtCb = cb;
  ov.addEventListener('click', function(e) { if (e.target===ov) { ov.remove(); cb(null); } });
  var inp = ov.querySelector('#_pmtInput');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', function(e) { if (e.key==='Enter') { ov.querySelectorAll('button')[1].click(); } });
}

function encodeId(id) { return parseInt(id) * 1114514; }
function decodeId(enc) { var n = parseInt(enc); return isNaN(n) ? 1 : Math.round(n / 1114514); }
var projectId = decodeId(new URLSearchParams(location.search).get('pid')) || 1;
var API = '/api';
var MIN_SCALE = 0.1, MAX_SCALE = 2;

function api(method, path, body, signal) {
  var opts = { method:method, headers:{'Content-Type':'application/json','Authorization':'Bearer '+token} };
  if (body) opts.body = JSON.stringify(body);
  if (signal) opts.signal = signal;
  return fetch(API+path, opts).then(function(r) {
    if (r.status===401) { localStorage.removeItem('canvas_token'); localStorage.removeItem('canvas_username'); window.location.replace('/login.html'); return Promise.reject(); }
    var ct = r.headers.get('content-type')||'';
    if (ct.indexOf('json')>=0) return r.json();
    return r.text().then(function(t){ try { return JSON.parse(t); } catch(e) { return null; } });
  });
}

// ==================== DOM 引用 ====================
var viewport = document.getElementById('viewport');
var world = document.getElementById('world');

// ==================== 相机 ====================
var camera = { x: window.innerWidth/2, y: (window.innerHeight-44)/2, scale: 1, targetX: window.innerWidth/2, targetY: (window.innerHeight-44)/2, targetScale: 1 };

function applyCamera() {
  world.style.transform = 'translate(' + camera.x + 'px, ' + camera.y + 'px) scale(' + camera.scale + ')';
}
function viewportOffset() {
  var r = viewport.getBoundingClientRect();
  return { left: r.left, top: r.top };
}
function screenToWorld(sx, sy) {
  var vo = viewportOffset();
  return { x: (sx - vo.left - camera.x) / camera.scale, y: (sy - vo.top - camera.y) / camera.scale };
}
function worldToScreen(wx, wy) {
  var vo = viewportOffset();
  return { x: wx * camera.scale + camera.x + vo.left, y: wy * camera.scale + camera.y + vo.top };
}

// ==================== 数据模型 ====================
var notes = [];
var mediaNodes = [];
var connections = [];
var noteIdCounter = 0;
var mediaIdCounter = 0;
var connIdCounter = 0;
var currentTool = 'select';
var selectedMediaIds = [];
var selectedNoteIds = [];

// ==================== 剪贴板 + 撤销栈 ====================
var clipboard = null;
var undoStack = [];
var UNDO_MAX = 25;
var _skipUndoPush = false;

function pushUndo() {
  if (_skipUndoPush) return;
  var snap = serializeCanvas();
  undoStack.push(snap);
  if (undoStack.length > UNDO_MAX) undoStack.shift();
}

function undo() {
  if (undoStack.length === 0) return;
  var snap = undoStack.pop();
  restoreCanvas(snap);
  selectedMediaIds = mediaNodes.map(function(n){return n.id;});
  selectedNoteIds = notes.map(function(n){return n.id;});
  refreshSelections();
  toast('已撤销', '');
}

function copySelected() {
  var hasSel = selectedMediaIds.length > 0 || selectedNoteIds.length > 0;
  if (!hasSel) return;
  var selSet = {};
  selectedMediaIds.forEach(function(id) { selSet[id] = true; });
  selectedNoteIds.forEach(function(id) { selSet[id] = true; });
  var nodes = [];
  selectedMediaIds.forEach(function(id) {
    var h = findMediaById(id);
    if (h) { var nn = JSON.parse(JSON.stringify(h.node)); nodes.push({ type:'media', data:nn }); }
  });
  selectedNoteIds.forEach(function(id) {
    var h = findNoteById(id);
    if (h) { var nn = JSON.parse(JSON.stringify(h.note)); nodes.push({ type:'note', data:nn }); }
  });
  var conns = connections.filter(function(c) { return selSet[c.sourceId] && selSet[c.targetId]; });
  clipboard = { nodes: nodes, connections: conns };
  toast('已复制 ' + nodes.length + ' 个节点', '');
}
window.copySelected = copySelected;

function cutSelected() {
  var hasSel = selectedMediaIds.length > 0 || selectedNoteIds.length > 0;
  if (!hasSel) return;
  copySelected();
  var total = selectedMediaIds.length + selectedNoteIds.length;
  pushUndo();
  _skipUndoPush = true;
  selectedMediaIds.slice().forEach(function(id) { deleteNode(id); });
  selectedNoteIds.slice().forEach(function(id) { deleteNote(id); });
  _skipUndoPush = false;
  toast('已剪切 ' + total + ' 个节点', '');
}

function pasteNodes() {
  if (!clipboard || !clipboard.nodes || !clipboard.nodes.length) return;
  pushUndo();
  clearSelection();
  var idMap = {};
  clipboard.nodes.forEach(function(item) {
    var oldId = item.data.id;
    var newId = (item.type==='media' ? (item.data.type==='script'?'scr_':item.data.type==='frame'?'frm_':'md_') : 'note_') + (item.type==='media' ? ++mediaIdCounter : ++noteIdCounter);
    idMap[oldId] = newId;
    if (item.type === 'media') {
      var nd = JSON.parse(JSON.stringify(item.data));
      nd.id = newId; nd.x += 60; nd.y += 60; nd.nameLocked = false;
      if (nd.type==='script') nd.outputText = '';
      if (nd.type==='frame') { nd.frameOutputRaw = ''; nd.frameOutputJson = null; nd.frameError = ''; }
      mediaNodes.push(nd); createNodeEl(nd);
    } else {
      var nn = JSON.parse(JSON.stringify(item.data));
      nn.id = newId; nn.x += 60; nn.y += 60; nn.locked = false;
      notes.push(nn); createNoteEl(nn);
    }
  });
  if (clipboard.connections) {
    clipboard.connections.forEach(function(c) {
      var newSrc = idMap[c.sourceId], newTgt = idMap[c.targetId];
      if (newSrc && newTgt) addConnection(newSrc, newTgt);
    });
  }
  // 粘贴后自动选中新节点
  Object.values(idMap).forEach(function(nid) {
    if (nid.indexOf('note_') === 0) selectedNoteIds.push(nid);
    else selectedMediaIds.push(nid);
  });
  refreshSelections();
  autoSave();
  toast('已粘贴 ' + clipboard.nodes.length + ' 个节点', '');
}
window.pasteNodes = pasteNodes;

window._debug = function() {
  return { mediaNodes: mediaNodes, connections: connections, notes: notes, maxZ: maxZ, selectedMediaIds: selectedMediaIds };
};
function bringToFront(el, nodeId) {
  if (!el) return;
  el.style.zIndex = ++maxZ;
  // 关联连线也提到 SVG 渲染顺序末尾
  if (nodeId) {
    connections.forEach(function(c) {
      if (c.sourceId === nodeId || c.targetId === nodeId) {
        var p = document.getElementById('conn-'+c.id);
        if (p && p.parentNode) p.parentNode.appendChild(p);
      }
    });
  }
}

// ==================== 相机动画 ====================
function animateCamera() {
  var lerp = 0.2;
  if (Math.abs(camera.x - camera.targetX) > 0.05 || Math.abs(camera.y - camera.targetY) > 0.05 || Math.abs(camera.scale - camera.targetScale) > 0.0005) {
    camera.x += (camera.targetX - camera.x) * lerp;
    camera.y += (camera.targetY - camera.y) * lerp;
    camera.scale += (camera.targetScale - camera.scale) * lerp;
  } else {
    camera.x = camera.targetX; camera.y = camera.targetY; camera.scale = camera.targetScale;
  }
  applyCamera();
  updateZoomUI();
  requestAnimationFrame(animateCamera);
}

function updateZoomUI() {
  document.getElementById('zoomText').textContent = Math.round(camera.scale * 100) + '%';
}
function showZoomIndicator() {
  zoomIndicator.textContent = Math.round(camera.scale * 100) + '%';
  zoomIndicator.classList.add('show');
  if (zoomIndicatorTimer) clearTimeout(zoomIndicatorTimer);
  zoomIndicatorTimer = setTimeout(function() { zoomIndicator.classList.remove('show'); }, 800);
}

// ==================== 节点 DOM ====================
function ensureNodeEl(node) {
  var el = document.querySelector('.world-node[data-id="'+node.id+'"]');
  if (!el) {
    el = document.createElement('div');
    el.className = 'world-node';
    el.dataset.id = node.id;
    world.appendChild(el);
  }
  // 始终确保尺寸有效
  if (!node.width || node.width < 60) node.width = 400;
  if (!node.height || node.height < 60) node.height = 300;
  if (!node.x || isNaN(node.x)) node.x = 0;
  if (!node.y || isNaN(node.y)) node.y = 0;
  buildNodeContent(node, el);
  return el;
}
function createNodeEl(node) {
  var el = document.createElement('div');
  el.className = 'world-node';
  el.dataset.id = node.id;
  el.style.width = node.width + 'px';
  el.style.height = node.height + 'px';
  el.style.left = node.x + 'px';
  el.style.top = node.y + 'px';
  buildNodeContent(node, el);
  world.appendChild(el);
  return el;
}

function buildNodeContent(node, el) {
  // 防御：确保最小尺寸，防止旧数据中有异常值
  if (!node.width || node.width < 60) node.width = 400;
  if (!node.height || node.height < 60) node.height = 300;
  el.style.width = node.width + 'px';
  el.style.height = node.height + 'px';
  el.style.left = node.x + 'px';
  el.style.top = node.y + 'px';
  el.className = 'world-node';
  if (selectedMediaIds.indexOf(node.id) >= 0) el.classList.add('selected');

  if (node.type === 'image' && node.genState === 'generating') {
    // 占位节点 - 生成中
    el.classList.add('node-image');
    var icl = getNodeLabel(node);
    var keyTag = node.genFrameKey ? ' ⏳ '+escHtml(node.genFrameKey) : '';
    el.innerHTML = '<div class="media-title media-title-locked" data-node-id="'+node.id+'">🖼️ '+escHtml(icl.label)+keyTag+'</div>'+
      '<div class="media-body" style="display:flex;align-items:center;justify-content:center;flex-direction:column;">'+
        '<div class="node-progress" style="flex-shrink:0;width:80%;"><div class="progress-track"><div class="progress-fill"></div></div><div class="progress-label">'+escHtml(node.progress.label||'AI 生成中...')+'</div></div>'+
      '</div>'+
      '<div class="frame-toolbar" style="justify-content:center;padding:4px;"><button class="btn-cancel" onmousedown="window._nodeBtn(this,\'cancel\',event)" style="background:rgba(245,63,63,0.15);color:#F53F3F;border-color:rgba(245,63,63,0.25);padding:3px 12px;border-radius:5px;border:0.5px solid;cursor:pointer;font-size:10px;font-family:inherit;">⏹ 取消</button></div>';
  } else if (node.type === 'image' && node.genState === 'failed') {
    // 占位节点 - 失败
    el.classList.add('node-image');
    var fcl = getNodeLabel(node);
    var fkeyTag = node.genFrameKey ? ' '+escHtml(node.genFrameKey) : '';
    var errMsg = node.genError || '未知错误';
    el.innerHTML = '<div class="media-title" data-node-id="'+node.id+'">⚠️ '+escHtml(fcl.label)+fkeyTag+'</div>'+
      '<div class="media-body" style="display:flex;align-items:center;justify-content:center;flex-direction:column;padding:16px;gap:10px;">'+
        '<div style="display:flex;align-items:center;gap:8px;">'+
          '<span style="position:relative;display:inline-block;width:32px;height:32px;background:#F5A623;border-radius:50%;text-align:center;line-height:32px;font-size:18px;flex-shrink:0;">⚠</span>'+
          '<span style="color:#F53F3F;font-size:11px;font-weight:600;">生成失败</span>'+
        '</div>'+
        '<div style="color:var(--text2);font-size:10px;text-align:center;line-height:1.5;max-width:90%;word-break:break-all;">'+escHtml(errMsg)+'</div>'+
      '</div>'+
      '<div class="frame-toolbar" style="justify-content:center;padding:4px;gap:6px;">'+
        '<button onmousedown="window._retryGen(\''+node.id+'\',event)" style="padding:3px 12px;border-radius:5px;border:0.5px solid rgba(5,163,197,0.3);background:rgba(5,163,197,0.15);color:var(--accent);cursor:pointer;font-size:10px;font-family:inherit;">🔄 重试</button>'+
        '<button onmousedown="window._nodeBtn(this,\'closeFailed\',event)" style="padding:3px 12px;border-radius:5px;border:0.5px solid rgba(245,63,63,0.2);background:rgba(245,63,63,0.1);color:#F53F3F;cursor:pointer;font-size:10px;font-family:inherit;">🗑 关闭</button>'+
      '</div>';
  } else if (node.type === 'image' && node.src) {
    // 正常图片节点
    el.classList.add('node-image');
    var icl2 = getNodeLabel(node);
    var nameTitle = node.name ? ' | '+escHtml(node.name) : '';
    var nameCls = node.nameLocked ? ' media-title-locked' : '';
    var keyInfo = node.genFrameKey ? ' 镜号:'+escHtml(node.genFrameKey) : '';
    el.innerHTML = '<div class="media-title'+nameCls+'" data-node-id="'+node.id+'">🖼️ '+escHtml(icl2.label)+keyInfo+nameTitle+'</div><div class="media-body"><img src="'+escAttr(node.src)+'" draggable="false"><div class="replace-hint">双击替换 · 拖拽移动</div></div>';
  } else if (node.type === 'video' && node.src) {
    el.classList.add('node-video');
    var vcl = getNodeLabel(node);
    var vnameTitle = node.name ? ' | '+escHtml(node.name) : '';
    el.innerHTML = '<div class="media-title" data-node-id="'+node.id+'">🎬 '+escHtml(vcl.label)+vnameTitle+'</div><div class="media-body">'+(node.playing ? '<video src="'+escAttr(node.src)+'" autoplay controls style="width:100%;height:100%;object-fit:contain;"></video>' : '<div class="play-btn" onclick="event.stopPropagation();window._toggleVideo(\''+node.id+'\')">▶</div>')+'</div>';
  } else if (node.type === 'script') {
    el.classList.add('node-script');
    var scl = getNodeLabel(node);
    el.innerHTML = '<div class="script-title">📝 '+escHtml(scl.label)+'</div>'+
      '<div class="script-body">'+
      '<textarea class="script-input" placeholder="点击输入剧本内容...">'+escHtml(node.inputText||'')+'</textarea>'+
      '<div class="script-row"><button class="btn-agent" onmousedown="window._nodeBtn(this,\'agent\',event)">🤖 '+(node.agentId?'已选择':'选择智能体')+'</button>'+(node.progress&&node.progress.active?'<button class="btn-cancel" onmousedown="window._nodeBtn(this,\'cancel\',event)">⏹ 取消</button>':'<button class="btn-run" onmousedown="window._nodeBtn(this,\'run\',event)">▶ 拆分</button>')+'</div>'+
      '<textarea class="script-output" placeholder="拆分结果（只读）..." readonly>'+escHtml(node.outputText||'')+'</textarea></div>'+
      (node.progress && node.progress.active ? '<div class="node-progress"><div class="progress-track"><div class="progress-fill"></div></div><div class="progress-label">'+escHtml(node.progress.label||'AI 处理中...')+'</div></div>' : '');
    bindScriptEvents(el, node);
  } else if (node.type === 'frame') {
    el.classList.add('node-frame');
    var kfs = getFrameKeyframes(node);
    var hasErr = node.frameError && !node.progress.active;
    var bodyHtml;
    if (kfs.length) {
      bodyHtml = '<div class="frame-table-preview">'+buildFrameTablePreview(node)+'</div>';
    } else if (hasErr) {
      bodyHtml = '<div class="frame-error"><div class="frame-error-icon">⚠️</div><div class="frame-error-msg">'+escHtml(node.frameError)+'</div>'+(node.frameOutputRaw?'<div class="frame-error-raw" style="max-height:120px;overflow-y:auto;margin-top:8px;padding:8px;background:rgba(0,0,0,0.3);border-radius:6px;font-size:10px;color:var(--text2);white-space:pre-wrap;word-break:break-all;">'+escHtml(node.frameOutputRaw.substring(0,2000))+'</div>':'')+'</div>';
    } else {
      bodyHtml = '<div class="frame-body">连接剧本拆分节点并生成关键帧</div>';
    }
    var fcl = getNodeLabel(node);
    el.innerHTML = '<div class="frame-title">🎬 '+escHtml(fcl.label)+(kfs.length ? ' ('+kfs.length+'帧)' : (hasErr?' ⚠️':'') )+'</div>'+
      bodyHtml+
      (node.progress && node.progress.active ? '<div class="node-progress"><div class="progress-track"><div class="progress-fill"></div></div><div class="progress-label">'+escHtml(node.progress.label||'AI 处理中...')+'</div></div>' : '')+
      '<div class="frame-toolbar"><button class="btn-agent" onmousedown="window._nodeBtn(this,\'agent\',event)">🤖 '+(node.frameAgentId?'已选择':'选择智能体')+'</button>'+(node.progress&&node.progress.active?'<button class="btn-cancel" onmousedown="window._nodeBtn(this,\'cancel\',event)">⏹ 取消</button>':'<button class="btn-gen" onmousedown="window._nodeBtn(this,\'gen\',event)">▶ 生成帧</button>')+ (kfs.length && !node.progress.active ? '<button class="btn-gen-img" onmousedown="window._nodeBtn(this,\'genImg\',event)">🎨 生成图</button><button class="btn-expand" onmousedown="window._nodeBtn(this,\'expand\',event)">📋 展开</button>' : (kfs.length ? '<button class="btn-expand" onmousedown="window._nodeBtn(this,\'expand\',event)">📋 展开</button>' : '')) +'<button class="btn-snapshot" onmousedown="window._nodeBtn(this,\'snapshot\',event)" title="快照">📸</button></div>';
    bindFrameEvents(el, node);
  } else if (node.type === 'image' || node.type === 'video' || !node.type || node.state === 'empty') {
    el.classList.add('node-empty');
    var ecl = node.type ? getNodeLabel(node) : {label:'未知节点'};
    var icon = node.type==='video'?'🎬':'🖼️';
    var enameTitle = node.name ? ' | '+escHtml(node.name) : '';
    el.innerHTML = '<div class="media-title" data-node-id="'+node.id+'">'+icon+' '+escHtml(ecl.label)+enameTitle+'</div><div class="drop-hint">拖入文件或双击上传</div>';
  } else {
    el.classList.add('node-empty');
    el.innerHTML = '<div class="media-title">❓ 未知</div><div class="drop-hint">右键删除</div>';
  }

  // 重绘 innerHTML 之后必须重新创建连接点
  addConnPoints(el, node.type);
}
function addConnPoints(el, type) {
  // 先移除旧连接点防止重复
  el.querySelectorAll('.conn-point').forEach(function(p) { p.remove(); });
  if (type !== 'video') {
    var rp = document.createElement('div');
    rp.className = 'conn-point right'; rp.dataset.side = 'right';
    el.appendChild(rp);
  }
  if (type !== 'script') {
    var lp = document.createElement('div');
    lp.className = 'conn-point left'; lp.dataset.side = 'left';
    el.appendChild(lp);
  }
}

// ==================== 脚本节点事件绑定 ====================
function bindScriptEvents(el, node) {
  var input = el.querySelector('.script-input');
  if (input) {
    input.addEventListener('input', function() { node.inputText = input.value; autoSave(); });
    input.addEventListener('mousedown', function(e) { e.stopPropagation(); });
  }
  var output = el.querySelector('.script-output');
  if (output) { output.addEventListener('mousedown', function(e) { e.stopPropagation(); }); }
}

function updateDownstreamFrameNodes(scriptNode) {
  var outgoing = connections.filter(function(c){return c.sourceId===scriptNode.id;});
  outgoing.forEach(function(conn){
    var tgt = findMediaById(conn.targetId);
    if (tgt && tgt.node.type==='frame') {
      tgt.node.sourceScriptId = scriptNode.id;
      tgt.node.frameInputText = scriptNode.outputText || '';
      tgt.node.frameOutputRaw = ''; tgt.node.frameOutputJson = null; tgt.node.frameOutputScroll = 0;
      autoSave();
      var el = document.querySelector('.world-node[data-id="'+tgt.node.id+'"]');
      if (el) buildNodeContent(tgt.node, el);
    }
  });
}

// ==================== 帧表格预览 ====================
function getFrameKeyframes(node) {
  if (node.frameOutputJson && node.frameOutputJson['关键帧列表']) return node.frameOutputJson['关键帧列表'];
  if (node.frameOutputJson && Array.isArray(node.frameOutputJson)) return node.frameOutputJson;
  return [];
}
function buildFrameTablePreview(node) {
  var kfs = getFrameKeyframes(node);
  if (!kfs.length) return '';
  var cols = [
    { key:'id', label:'镜号', w:38 }, { key:'时间参考', label:'时间', w:46 }, { key:'景别', label:'景别', w:34 },
    { key:'角度', label:'角度', w:34 }, { key:'角色', label:'角色', w:52, arr:true }, { key:'场景', label:'场景', w:70 },
    { key:'道具', label:'道具', w:52, arr:true }, { key:'人物站位', label:'站位', w:72 }, { key:'提示词', label:'提示词', w:190 },
  ];
  var h = '<table><thead><tr>';
  for (var ci=0; ci<cols.length; ci++) h += '<th>'+cols[ci].label+'</th>';
  h += '</tr></thead><tbody>';
  for (var ri=0; ri<Math.min(kfs.length, 12); ri++) {
    h += '<tr>';
    for (var cj=0; cj<cols.length; cj++) {
      var v = kfs[ri][cols[cj].key]; if (v===undefined||v===null) v='';
      if (Array.isArray(v)) v = v.join(', ');
      v = String(v); if (v.length > 30) v = v.substring(0,28)+'…';
      h += '<td title="'+escAttr(v)+'">'+escHtml(v)+'</td>';
    }
    h += '</tr>';
  }
  h += '</tbody></table>';
  if (kfs.length > 12) h += '<div style="text-align:center;padding:4px;font-size:9px;color:var(--text2);">... 共 '+kfs.length+' 帧</div>';
  return h;
}

// ==================== 帧表格模态弹窗 ====================
var modalFontSize = parseInt(localStorage.getItem('modalFontSize')||'11') || 11;
var modalWidth  = localStorage.getItem('modalWidth')  || '85vw';
var modalHeight = localStorage.getItem('modalHeight') || '75vh';

function updateModalCells(box, fs) {
  box.querySelectorAll('td, th').forEach(function(cell) {
    cell.style.fontSize = fs + 'px';
  });
}
function setModalPreset(box, w, h) {
  box.style.width = w; box.style.height = h;
  modalWidth = w; modalHeight = h;
  localStorage.setItem('modalWidth', w);
  localStorage.setItem('modalHeight', h);
}

function showFrameTableModal(node) {
  var kfs = getFrameKeyframes(node);
  var cols = [
    { key:'id', label:'镜号', w:50 }, { key:'时间参考', label:'时间', w:60 }, { key:'景别', label:'景别', w:45 },
    { key:'角度', label:'角度', w:45 }, { key:'构图', label:'构图', w:70 }, { key:'角色', label:'角色', w:75, arr:true },
    { key:'场景', label:'场景', w:95 }, { key:'道具', label:'道具', w:75, arr:true },
    { key:'人物站位', label:'站位', w:90 }, { key:'提示词', label:'提示词', w:110 },
  ];
  var rows = kfs.map(function(kf, ri) {
    return '<tr>' + cols.map(function(c, ci) {
      var v = kf[c.key]; if (v===undefined||v===null) v=''; if (Array.isArray(v)) v=v.join(', '); v=String(v);
      var cls = ci === 0 ? ' class="sticky-td"' : '';
      return '<td'+cls+' contenteditable="true" data-row="'+ri+'" data-key="'+c.key+'" data-arr="'+(c.arr?'1':'0')+'" title="'+escAttr(v)+'">'+escHtml(v)+'</td>';
    }).join('') + '</tr>';
  }).join('');

  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = '<div class="modal-box" style="width:'+modalWidth+';height:'+modalHeight+';">'+
    '<div class="modal-header">'+
      '<span style="font-weight:600;color:#EC7CC3;">📋 关键帧列表 — '+kfs.length+'帧</span>'+
      '<div style="display:flex;align-items:center;gap:6px;">'+
        '<button class="modal-btn-font" data-act="fontDown" title="缩小字体">Aa-</button>'+
        '<button class="modal-btn-font" data-act="fontUp"   title="放大字体">Aa+</button>'+
        '<span class="sep" style="width:1px;height:14px;background:var(--border);margin:0 2px;"></span>'+
        '<button class="modal-btn-size" data-act="sizeM" title="中窗口 70%/60%">▢</button>'+
        '<button class="modal-btn-size" data-act="sizeL" title="大窗口 90%/80%">▣</button>'+
        '<button class="modal-btn-size" data-act="sizeF" title="全屏">⛶</button>'+
        '<span class="sep" style="width:1px;height:14px;background:var(--border);margin:0 2px;"></span>'+
        '<button style="background:none;border:none;color:#A1A1AA;cursor:pointer;font-size:18px;" onclick="this.closest(\'.modal-overlay\').remove()">✕</button>'+
      '</div></div>'+
    '<div class="modal-body">'+
      '<table style="border-collapse:collapse;width:auto;table-layout:auto;font-size:'+modalFontSize+'px;">'+
        '<thead><tr style="background:#1e1e1e;position:sticky;top:0;">'+cols.map(function(c, ci){var cls=ci===0?' class="sticky-th"':'';return '<th'+cls+' style="padding:5px 8px;text-align:left;color:#A1A1AA;border-bottom:0.5px solid rgba(255,255,255,0.1);white-space:nowrap;min-width:'+c.w+'px;">'+c.label+'</th>';}).join('')+'</tr></thead>'+
        '<tbody>'+rows+'</tbody>'+
      '</table></div>'+
    '<div class="modal-footer">点击单元格编辑 · 修改自动保存到JSON  |  <span style="color:var(--text2);">'+modalWidth+' × '+modalHeight+'</span></div>'+
    '<div class="modal-resize-handle"></div></div>';
  document.body.appendChild(overlay);

  var box = overlay.querySelector('.modal-box');

  // 初始化字体
  updateModalCells(box, modalFontSize);

  // 防止 DOM 变更导致 click 误关闭
  var modalBlockClose = false;
  function blockCloseTemporarily() {
    modalBlockClose = true;
    setTimeout(function() { modalBlockClose = false; }, 300);
  }

  // 标题栏按钮事件
  box.querySelector('.modal-header').addEventListener('mousedown', function(e) {
    var btn = e.target.closest('button');
    if (!btn) return;
    e.stopPropagation(); e.preventDefault();
    blockCloseTemporarily();
    var act = btn.dataset.act;
    if (act === 'fontDown') { modalFontSize = Math.max(8, modalFontSize - 1); }
    if (act === 'fontUp')   { modalFontSize = Math.min(24, modalFontSize + 1); }
    if (act === 'sizeM')    { setModalPreset(box, '70vw', '60vh'); }
    if (act === 'sizeL')    { setModalPreset(box, '90vw', '80vh'); }
    if (act === 'sizeF')    { setModalPreset(box, '100vw', '100vh'); }
    if (act === 'fontDown' || act === 'fontUp') {
      localStorage.setItem('modalFontSize', modalFontSize);
      updateModalCells(box, modalFontSize);
    }
    if (act && act.indexOf('size') === 0) {
      box.querySelector('.modal-footer').innerHTML = '点击单元格编辑 · 修改自动保存到JSON  |  <span style="color:var(--text2);">'+modalWidth+' × '+modalHeight+'</span>';
    }
  });

  // 自定义拖拽调整窗口大小
  var handle = box.querySelector('.modal-resize-handle');
  var isResizing = false, resizeStartX, resizeStartY, resizeOrigW, resizeOrigH;
  handle.addEventListener('mousedown', function(e) {
    e.stopPropagation(); e.preventDefault();
    blockCloseTemporarily();
    isResizing = true;
    resizeStartX = e.clientX; resizeStartY = e.clientY;
    resizeOrigW = box.offsetWidth; resizeOrigH = box.offsetHeight;
  });
  window.addEventListener('mousemove', function(e) {
    if (!isResizing) return;
    var dw = e.clientX - resizeStartX, dh = e.clientY - resizeStartY;
    var nw = Math.max(400, resizeOrigW + dw);
    var nh = Math.max(250, resizeOrigH + dh);
    box.style.width = nw + 'px'; box.style.height = nh + 'px';
    modalWidth = nw + 'px'; modalHeight = nh + 'px';
    box.querySelector('.modal-footer').innerHTML = '点击单元格编辑 · 修改自动保存到JSON  |  <span style="color:var(--text2);">'+modalWidth+' × '+modalHeight+'</span>';
  });
  window.addEventListener('mouseup', function() {
    if (!isResizing) return;
    isResizing = false;
    localStorage.setItem('modalWidth', modalWidth);
    localStorage.setItem('modalHeight', modalHeight);
  });

  overlay.addEventListener('click', function(e) {
    if (modalBlockClose) return;
    if (e.target === overlay) overlay.remove();
  });

  // 单元格编辑
  box.querySelectorAll('td[contenteditable]').forEach(function(td) {
    var origText = '';
    td.addEventListener('focus', function() { origText = td.textContent; });
    td.addEventListener('blur', function() {
      var ri = parseInt(td.dataset.row), key = td.dataset.key, isArr = td.dataset.arr==='1';
      var newVal = td.textContent.trim();
      if (ri >= 0 && ri < kfs.length && key) {
        if (isArr) kfs[ri][key] = newVal ? newVal.split(',').map(function(s){return s.trim();}).filter(Boolean) : [];
        else kfs[ri][key] = newVal;
        if (node.frameOutputJson && node.frameOutputJson['关键帧列表']) node.frameOutputJson['关键帧列表'] = kfs;
        else if (node.frameOutputJson && Array.isArray(node.frameOutputJson)) node.frameOutputJson = kfs;
        node.frameOutputRaw = JSON.stringify(node.frameOutputJson, null, 2);
        autoSave();
        var el2 = document.querySelector('.world-node[data-id="'+node.id+'"]');
        if (el2) buildNodeContent(node, el2);
      }
    });
    td.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { td.textContent = origText; td.blur(); }
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); td.blur(); }
    });
  });
}

function createNoteEl(note) {
  var el = document.createElement('div');
  el.className = 'world-note'; el.dataset.id = note.id;
  el.style.left = note.x + 'px'; el.style.top = note.y + 'px';
  el.style.width = note.width + 'px'; el.style.height = note.height + 'px';
  el.style.zIndex = note.locked ? 0 : 1;
  var card = document.createElement('div');
  card.className = 'note-card';
  card.contentEditable = 'false';
  card.style.fontSize = (note.fontSize||14) + 'px';
  card.style.fontWeight = note.bold ? 'bold' : 'normal';
  card.style.textDecoration = (note.underline?'underline ':'') + (note.strikethrough?'line-through':'');
  card.style.color = note.fontColor || '#e0e0e0';
  card.style.lineHeight = note.lineHeight || 1.5;
  if (note.color && note.color !== '#1a1a2e') card.style.background = note.color;
  if (note.text && note.text.trim()) { card.textContent = note.text; }
  else { card.innerHTML = '<br>'; }

  var placeholder = document.createElement('div');
  placeholder.className = 'note-placeholder';
  placeholder.innerHTML = '<span style="font-size:13px;">双击开始编写...</span>';
  card.appendChild(placeholder);
  card.addEventListener('input', function() { var txt = card.innerText || ''; note.text = txt.trim() ? txt : ''; if (!note.text.trim() && card.querySelector('br')) card.innerHTML = '<br>'; updatePlaceholder(); autoSave(); });
  var updatePlaceholder = function() { placeholder.style.display = (note.text && note.text.trim()) ? 'none' : 'flex'; };
  updatePlaceholder();

  // 双击 → 进入编辑
  card.addEventListener('dblclick', function(e) {
    e.stopPropagation();
    card.contentEditable = 'true'; card.focus();
    placeholder.style.display = 'none'; showNoteFormatBar(note, card);
    var sel = window.getSelection();
    if (sel) { var r = document.createRange(); r.selectNodeContents(card); r.collapse(false); sel.removeAllRanges(); sel.addRange(r); }
  });
  // 失焦 → 退出编辑
  card.addEventListener('blur', function() {
    card.contentEditable = 'false'; updatePlaceholder(); hideNoteFormatBar();
  });

  el.appendChild(card);
  el.appendChild(resizeWrap);
  world.appendChild(el);
  return el;

function getNodeLabel(node) {
  var typeNames = { script:'剧本节点', frame:'帧分析节点', image:'图片节点', video:'视频节点' };
  var base = typeNames[node.type] || '节点';

    var nb = parseInt(b.id.replace(/^[a-z]+_/, '')) || 0;

  });

  for (var j = 0; j < sameType.length; j++) {

  var label = base + ' ' + (idx > 0 ? idx : '?');

  console.log('[node标签] id='+node.id+' type='+node.type+' label="'+label+'" 同类型总数='+sameType.length);

function getFrameRefImages(frameNode) {

  });
  // 从关键帧JSON获取角色/场景/道具名称，在连线节点中匹配

function collectGenRefImages(frameNode, keyframeId) {
  // 收集特定镜号的参考图（base64）
  var kfs = getFrameKeyframes(frameNode);
  var kf = null;
  for (var i = 0; i < kfs.length; i++) { if (kfs[i].id === keyframeId) { kf = kfs[i]; break; } }
  if (!kf) return { images:[], warn:['镜号 '+keyframeId+' 不存在'] };
  console.log('[生图参考] 镜号='+keyframeId+' 角色='+JSON.stringify(kf['角色'])+' 场景='+kf['场景']+' 道具='+JSON.stringify(kf['道具']));
  var images = [];
  var warn = [];
  // 从上游连线的图片节点收集 base64
  var inConns = connections.filter(function(c) { return c.targetId === frameNode.id; });
  inConns.forEach(function(c) {
    var src = findMediaById(c.sourceId);
    if (!src || !src.node.src || !src.node.name) return;
    // 简易匹配：name 出现在角色/场景/道具字段中
    var nm = src.node.name;
    var ext = nm.indexOf('.')===-1;
    var matched = false;
    (kf['角色']||[]).forEach(function(r) { if (r && (r===nm||r===nm+'.jpg'||r===nm+'.png'||(ext&&r.indexOf(nm)===0))) matched = true; });
    if (kf['场景'] && (kf['场景']===nm||kf['场景']===nm+'.png'||(ext&&kf['场景'].indexOf(nm)===0))) matched = true;
    (kf['道具']||[]).forEach(function(p) { if (p && (p===nm||p===nm+'.png'||(ext&&p.indexOf(nm)===0))) matched = true; });
    if (matched) {
      // 读取图片转base64 (通过fetch)
      images.push({ name:nm, url:src.node.src });
      console.log('[生图参考] 匹配: '+nm+' -> '+src.node.src);
    }
  });
  return { images:images, warn:warn };
}
function loadImagesAsBase64(urls, callback) {
  // 把图片URL转为base64，批量完成后回调
  var results = [];
  var pending = urls.length;
  if (!pending) { callback(results); return; }
  urls.forEach(function(u, idx) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      var canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
      var ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
      results[idx] = canvas.toDataURL('image/png');
      pending--; if (pending === 0) callback(results);
    };
    img.onerror = function() { results[idx] = null; pending--; if (pending === 0) callback(results); };
    img.src = u;
  });
}

// ==================== 连线管理 ====================
function canConnect(src, tgt) {
  if (!src || !tgt) return false;
  if (src.type === 'video') return false;
  if (tgt.type === 'script') return false;
  if (tgt.type === 'frame' && src.type !== 'script' && src.type !== 'image') return false;
  if (tgt.type === 'video' && src.type !== 'frame' && src.type !== 'image') return false;
  if (tgt.type === 'video' && src.type === 'frame') {
    var hasFS = connections.some(function(c){ var s=findMediaById(c.sourceId); return c.targetId===tgt.id && s && s.node.type==='frame'; });
    if (hasFS) return false;
  }
  // 防止环路：检查 tgt 是否能到达 src（通过现有连线）
  if (src.id && tgt.id && src.id !== '_m_' && tgt.id !== '_m_') {
    if (wouldCreateCycle(src.id, tgt.id)) return false;
  }
  return true;
}
function wouldCreateCycle(fromId, toId) {
  // DFS：从 toId 出发，沿着现有连线向下游走，看能否到达 fromId
  var visited = {};
  var stack = [toId];
  while (stack.length > 0) {
    var cur = stack.pop();
    if (cur === fromId) return true;
    if (visited[cur]) continue;
    visited[cur] = true;
    for (var i = 0; i < connections.length; i++) {
      if (connections[i].sourceId === cur) {
        stack.push(connections[i].targetId);
      }
    }
  }
  return false;
}
function addConnection(srcId, tgtId) { pushUndo();
  if (srcId === tgtId) { console.warn('[addConnection] 自连拒绝 '+srcId); return; }
  if (connections.some(function(c){return c.sourceId===srcId && c.targetId===tgtId;})) { console.warn('[addConnection] 重复连线拒绝 '+srcId+'->'+tgtId); return; }
  if (wouldCreateCycle(srcId, tgtId)) { console.warn('[addConnection] 环路拒绝 '+srcId+'->'+tgtId); return; }
  var src = findMediaById(srcId), tgt = findMediaById(tgtId);
  if (!canConnect(src?src.node:null, tgt?tgt.node:null)) { console.warn('[addConnection] canConnect拒绝 '+srcId+'->'+tgtId); return; }
  var cid = 'conn_'+(++connIdCounter);
  connections.push({ id:cid, sourceId:srcId, targetId:tgtId });
  console.log('[addConnection] ✓ '+srcId+' -> '+tgtId+' (id='+cid+') 当前连线数='+connections.length);
  updateConnectionsSvg();
  autoSave();
}
function removeConnection(id) { if (!_skipUndoPush) pushUndo();
  connections = connections.filter(function(c){return c.id!==id;});
  if (selectedConnectionId === id) selectedConnectionId = null;
  updateConnectionsSvg();
  autoSave();
}

  e.stopPropagation(); e.preventDefault();
  if (action === 'agent') {
    var cb = function(agentId) {
      if (nodeEl.classList.contains('node-frame')) { node.frameAgentId = agentId; }
      else { node.agentId = agentId; }
      buildNodeContent(node, nodeEl); autoSave();
    };
    showAgentPicker(cb);
  }
  if (action === 'run') {
    if (!node.agentId) { toast('请先选择智能体','error'); return; }
    if (!node.inputText) { toast('请先输入剧本内容','error'); return; }
    var ac = new AbortController(); node._abort = function() { ac.abort(); };
    node.progress = {active:true, label:'AI 拆分中...'}; buildNodeContent(node, nodeEl); autoSave();
    api('POST','/llm/call',{agentId:node.agentId,messages:[{role:'user',content:node.inputText}]}, ac.signal).then(function(r){
      node.outputText = r ? (r.content||r.error||'无响应') : '调用失败';
      node.progress = {active:false, label:''}; node._abort = null; buildNodeContent(node, nodeEl); autoSave();
      updateDownstreamFrameNodes(node);
    }).catch(function(err){
      if (err && err.name === 'AbortError') { node.progress = {active:false, label:''}; node._abort = null; buildNodeContent(node, nodeEl); autoSave(); return; }
      node.progress = {active:false, label:''}; node._abort = null; buildNodeContent(node, nodeEl); toast('调用失败: '+(err&&err.message||'网络错误'), 'error');
    });
  }
  if (action === 'gen') {
    if (!node.frameAgentId) { toast('请先选择智能体','error'); return; }
    // 实时查找上游已连接且有输出的剧本拆分节点
    var inputContent = '';
    var inConn = connections.filter(function(c){return c.targetId===node.id;});
    for (var ci=0; ci<inConn.length; ci++) {
      var src = findMediaById(inConn[ci].sourceId);
      if (src && src.node.type==='script' && src.node.outputText) { inputContent = src.node.outputText; break; }
    }
    if (!inputContent) { toast('请先连接剧本拆分节点并执行拆分','error'); return; }
    node.frameInputText = inputContent;
    var ac2 = new AbortController(); node._abort = function() { ac2.abort(); };
    node.progress = {active:true, label:'AI 生成关键帧...'}; node.frameError = ''; buildNodeContent(node, nodeEl); autoSave();
    api('POST','/llm/call',{agentId:node.frameAgentId,skillId:1,messages:[{role:'user',content:inputContent}]}, ac2.signal).then(function(r){
      node.progress = {active:false, label:''}; node._abort = null;
      if (!r) { node.frameError = '调用失败：无响应'; buildNodeContent(node, nodeEl); autoSave(); return; }
      if (r.error) { node.frameError = '调用失败：'+r.error; buildNodeContent(node, nodeEl); autoSave(); return; }
      node.frameOutputRaw = r.content || '';
      node.frameOutputJson = tryExtractJson(node.frameOutputRaw);
      if (!node.frameOutputJson) {
        node.frameError = 'JSON解析失败（LLM返回非标准格式，点击查看原始响应）';
        console.warn('[帧生成] JSON解析失败，原始响应:', node.frameOutputRaw.substring(0,300));
      }
      buildNodeContent(node, nodeEl); autoSave();
    }).catch(function(err){
      if (err && err.name === 'AbortError') { node.progress = {active:false, label:''}; node._abort = null; buildNodeContent(node, nodeEl); autoSave(); return; }
      node.frameError = '网络错误：'+(err&&err.message||'未知'); node.progress = {active:false, label:''}; node._abort = null; buildNodeContent(node, nodeEl); autoSave();
    });
  }
  if (action === 'cancel') {
    if (node._abort) { node._abort(); node._abort = null; }
    if (node.genState === 'generating') { deleteNode(node.id); autoSave(); return; }
    node.progress = {active:false, label:''}; buildNodeContent(node, nodeEl); autoSave();
  }
  if (action === 'closeFailed') {
    deleteNode(node.id); autoSave();
  }
  if (action === 'expand') {
    showFrameTableModal(node);
  }
  if (action === 'genImg') {
    var kfs2 = getFrameKeyframes(node);
    if (!kfs2.length) { toast('请先生成关键帧','error'); return; }
    console.log('[生图] 开始生图流程, 帧节点='+node.id+' 关键帧数='+kfs2.length);
    showGenImageModal(node, kfs2);
  }
  if (action === 'snapshot') {
    showSnapshotModal(node);
  }
};

function showStyleEditor(styleId, parentOverlay, reloadCallback) {

  overlay2.innerHTML = '<div class="modal-box" style="width:460px;height:auto;padding:24px;">'+

    '<div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--text2);">中文风格提示词</label><textarea id="edtStylePrompt" rows="4" style="width:100%;padding:8px;background:rgba(255,255,255,0.04);border:0.5px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;resize:vertical;"></textarea></div>'+
    '<div style="margin-bottom:10px;"><label style="font-size:12px;color:var(--text2);">封面图片（可选）</label>'+
      '<div style="display:flex;gap:8px;align-items:center;"><input type="file" id="edtStyleCover" accept="image/*" style="font-size:11px;color:var(--text2);"></div>'+
      '<div id="coverPreview" style="margin-top:4px;width:100%;height:60px;border-radius:4px;background-size:cover;background-position:center;display:none;"></div></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;">'+
      '<button onclick="this.closest(\'.modal-overlay\').remove()" style="padding:8px 16px;border-radius:6px;border:0.5px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text2);cursor:pointer;font-family:inherit;">取消</button>'+
      '<button id="btnStyleSave" style="padding:8px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;">💾 保存</button>'+
    '</div></div>';
  document.body.appendChild(overlay2);
  overlay2.addEventListener('click', function(e) { if (e.target===overlay2) overlay2.remove(); });

  var coverInput = overlay2.querySelector('#edtStyleCover');
  coverInput.addEventListener('change', function() {
    var f = coverInput.files[0];
    if (!f) return;
    if (f.size > 10*1024*1024) { toast('封面文件不能超过 10MB','error'); coverInput.value = ''; return; }
    console.log('[封面] 选择文件: '+f.name+' size='+(f.size/1024).toFixed(1)+'KB');
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var ratio = img.naturalWidth / img.naturalHeight;
        if (Math.abs(ratio - 16/9) < 0.02) {
          // 比例正确，直接裁剪到 960×540 并上传
          doUploadCover(f, img, 0, 0, img.naturalWidth, img.naturalHeight);
        } else {
          // 比例不对，弹出裁剪弹窗
          showCropModal(img, 16/9, function(cropData) {
            doUploadCover(f, img, cropData.sx, cropData.sy, cropData.sw, cropData.sh);
          });
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(f);
  });

  function doUploadCover(file, img, sx, sy, sw, sh) {
    var prev = document.getElementById('coverPreview');
    prev.textContent = '⏳ 裁剪中...';
    prev.style.display = 'flex'; prev.style.alignItems = 'center'; prev.style.justifyContent = 'center';
    prev.style.color = 'var(--text2)'; prev.style.fontSize = '11px'; prev.style.backgroundImage = 'none';
    // canvas 裁剪并固定输出 960×540
    var canvas = document.createElement('canvas');
    canvas.width = 960; canvas.height = 540;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, 960, 540);
    canvas.toBlob(function(blob) {
      if (!blob) { prev.textContent = '❌ 裁剪失败'; return; }
      prev.textContent = '⏳ 上传中...';
      var fd = new FormData();
      fd.append('file', blob, 'cover_'+Date.now()+'.jpg');
      fetch(API+'/upload-cover', { method:'POST', headers:{'Authorization':'Bearer '+token}, body:fd })
        .then(function(r){return r.json();}).then(function(d) {
          if (d && d.url) {
            coverUrl = d.url;
            prev.style.backgroundImage = 'url('+d.url+')';
            prev.style.opacity = '1'; prev.textContent = '';
            prev.style.display = 'block';
            console.log('[封面] 上传成功: '+d.url);
          } else {
            prev.textContent = '❌ '+(d.error||'上传失败');
          }
        }).catch(function() { prev.textContent = '❌ 上传失败'; });
    }, 'image/jpeg', 0.9);
  }

  function showCropModal(img, targetRatio, callback) {
    var cropOverlay = document.createElement('div');
    cropOverlay.className = 'modal-overlay';
    cropOverlay.style.cssText = 'z-index:700;';
    var maxW = Math.min(window.innerWidth*0.8, img.naturalWidth);
    var maxH = Math.min(window.innerHeight*0.7, img.naturalHeight);
    var scale = Math.min(maxW/img.naturalWidth, maxH/img.naturalHeight);
    var dispW = Math.round(img.naturalWidth*scale), dispH = Math.round(img.naturalHeight*scale);
    // 初始16:9选区
    var cropW, cropH, cropX, cropY;
    if (dispW/dispH > targetRatio) { cropH = dispH; cropW = Math.round(cropH*targetRatio); }
    else { cropW = dispW; cropH = Math.round(cropW/targetRatio); }
    cropX = Math.round((dispW-cropW)/2); cropY = Math.round((dispH-cropH)/2);
    cropOverlay.innerHTML = '<div class="modal-box" style="width:'+(dispW+40)+'px;height:auto;padding:20px;overflow:visible;">'+
      '<div style="font-weight:600;margin-bottom:10px;">📐 框选 16:9 区域覆盖</div>'+
      '<div id="cropContainer" style="position:relative;width:'+dispW+'px;height:'+dispH+'px;overflow:hidden;cursor:move;">'+
        '<img src="'+img.src+'" style="width:'+dispW+'px;height:'+dispH+'px;display:block;">'+
        '<div id="cropBox" style="position:absolute;border:2px dashed #05DFF6;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);left:'+cropX+'px;top:'+cropY+'px;width:'+cropW+'px;height:'+cropH+'px;pointer-events:none;"></div>'+
      '</div>'+
      '<div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end;">'+
        '<button onclick="this.closest(\'.modal-overlay\').remove()" style="padding:6px 14px;border-radius:6px;border:0.5px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text2);cursor:pointer;font-family:inherit;">取消</button>'+
        '<button id="btnCropConfirm" style="padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;">✅ 确认裁剪</button>'+
      '</div></div>';
    document.body.appendChild(cropOverlay);
    cropOverlay.addEventListener('click', function(e) { if (e.target===cropOverlay) cropOverlay.remove(); });
    var container = cropOverlay.querySelector('#cropContainer');
    var box = cropOverlay.querySelector('#cropBox');
    var dragging = false, startX, startY, origLeft, origTop;
    container.addEventListener('mousedown', function(e) {
      e.preventDefault();
      dragging = true; startX = e.clientX; startY = e.clientY;
      origLeft = parseInt(box.style.left); origTop = parseInt(box.style.top);
      container.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      var dx = e.clientX - startX, dy = e.clientY - startY;
      var nl = Math.max(0, Math.min(dispW-cropW, origLeft+dx));
      var nt = Math.max(0, Math.min(dispH-cropH, origTop+dy));
      box.style.left = nl+'px'; box.style.top = nt+'px';
      cropX = nl; cropY = nt;
    });
    window.addEventListener('mouseup', function() {
      if (!dragging) return;
      dragging = false; container.style.cursor = 'move';
    });
    cropOverlay.querySelector('#btnCropConfirm').addEventListener('click', function() {
      var sx = Math.round(cropX/scale), sy = Math.round(cropY/scale);
      var sw = Math.round(cropW/scale), sh = Math.round(cropH/scale);
      cropOverlay.remove();
      console.log('[封面] 裁剪区域: '+sx+','+sy+' '+sw+'x'+sh);
      callback({sx:sx, sy:sy, sw:sw, sh:sh});
    });
  }

  if (isEdit) {
    api('GET','/styles/'+styleId).then(function(s) {
      document.getElementById('edtStyleName').value = s.name||'';
      document.getElementById('edtStyleDesc').value = s.description||'';
      document.getElementById('edtStylePrompt').value = s.prompt_suffix||'';
      if (s.cover_url) { coverUrl = s.cover_url; var prev = document.getElementById('coverPreview'); prev.style.backgroundImage = 'url('+s.cover_url+')'; prev.style.display = 'block'; }
    });
  }

  document.getElementById('btnStyleSave').addEventListener('click', function() {
    var name = document.getElementById('edtStyleName').value.trim();
    var desc = document.getElementById('edtStyleDesc').value.trim();
    var prompt = document.getElementById('edtStylePrompt').value.trim();
    if (!name||!prompt) { toast('名称和提示词不能为空','error'); return; }
    var method = isEdit ? 'PUT' : 'POST';
    var url = isEdit ? '/styles/'+styleId : '/styles';
    console.log('[风格] 保存: method='+method+' name='+name+' cover='+coverUrl);
    api(method, url, { name:name, description:desc, prompt_suffix:prompt, cover_url:coverUrl }).then(function(r) {
      if (r.ok) { overlay2.remove(); if (reloadCallback) reloadCallback(); }
    });
  });
}

function executeGenImage(node, keyframeId, refFrameNodeId, size, styleId) {
  var kfs = getFrameKeyframes(node);
  var kf = null;
  for (var i = 0; i < kfs.length; i++) { if (kfs[i].id === keyframeId) { kf = kfs[i]; break; } }
  if (!kf) { toast('镜号不存在','error'); return; }
  var prompt = kf['提示词'] || '';
  if (!prompt) { toast('该镜号无提示词','error'); return; }

  // 加载风格并拼接
  api('GET','/styles/'+styleId).then(function(style) {
    if (style && style.prompt_suffix) {
      prompt = prompt + '，' + style.prompt_suffix;
      console.log('[生图] 风格=['+style.name+'] 拼接后prompt长度='+prompt.length);
    }
    doExecuteGen(node, keyframeId, refFrameNodeId, size, prompt);
  });

  function doExecuteGen(node, keyframeId, refFrameNodeId, size, prompt) {
    // ① 立即创建占位图片节点
  var wx = node.x + node.width/2 + 100, wy = node.y;
  var placeholder = addMediaNode(wx, wy, 'image');
  placeholder.state = 'generating';
  placeholder.nameLocked = true;
  placeholder.genFrameKey = keyframeId;
  placeholder.genSize = size;
  placeholder.genState = 'generating';
  placeholder.progress = {active:true, label:'准备生成...'};
  var phEl = document.querySelector('.world-node[data-id="'+placeholder.id+'"]');
  if (phEl) buildNodeContent(placeholder, phEl);
  // 连线
  addConnection(node.id, placeholder.id);

  console.log('[生图] 占位节点 '+placeholder.id+' 已创建, 镜号='+keyframeId+' 尺寸='+size);

  // ② 收集参考图
  var imgUrls = [];
  var inConns = connections.filter(function(c){return c.targetId===node.id;});
  inConns.forEach(function(c){
    var src = findMediaById(c.sourceId);
    if (src && src.node.src && src.node.id !== placeholder.id) imgUrls.push(src.node.src);
  });

  var refFrameUrl = null;
  if (refFrameNodeId) {
    var refNode = findMediaById(refFrameNodeId);
    if (refNode && refNode.node.src) refFrameUrl = refNode.node.src;
  }

  // ③ 转base64 + 调API
  loadImagesAsBase64(imgUrls, function(base64s) {
    var validB64 = base64s.filter(function(b){return b;});
    placeholder.progress = {active:true, label:'AI 生成中...'};
    if (phEl) buildNodeContent(placeholder, phEl);
    autoSave();

    function doCall(b64s) {
      var ac = new AbortController();
      placeholder._abort = function() { ac.abort(); };
      fetch('/api/gen-image', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body: JSON.stringify({ prompt:prompt, refImages:b64s, size:size, refFrameUrl:null, projectId:projectId }),
        signal: ac.signal
      }).then(function(r){ return r.json(); }).then(function(d) {
        placeholder._abort = null;
        if (d && d.url) {
          console.log('[生图API] 成功! url='+d.url);
          placeholder.src = d.url; placeholder.state = 'loaded';
          placeholder.genState = ''; placeholder.progress = {active:false, label:''};
          var pel = document.querySelector('.world-node[data-id="'+placeholder.id+'"]');
          if (pel) buildNodeContent(placeholder, pel);
          autoSave();
        } else {
          console.warn('[生图API] 失败:',d);
          placeholder.genState = 'failed';
          placeholder.genError = d?d.error||'未知错误':'无响应';
          placeholder.progress = {active:false, label:''};
          placeholder.nameLocked = false;
          var pel = document.querySelector('.world-node[data-id="'+placeholder.id+'"]');
          if (pel) buildNodeContent(placeholder, pel);
          autoSave();
        }
      }).catch(function(err) {
        placeholder._abort = null;
        if (err && err.name === 'AbortError') {
          console.log('[生图API] 用户取消, 移除占位节点');
          deleteNode(placeholder.id);
          autoSave();
          return;
        }
        placeholder.genState = 'failed';
        placeholder.genError = (err&&err.message)||'网络错误';
        placeholder.progress = {active:false, label:''};
        placeholder.nameLocked = false;
        var pel = document.querySelector('.world-node[data-id="'+placeholder.id+'"]');
        if (pel) buildNodeContent(placeholder, pel);
        autoSave();
      });
    }

    if (refFrameUrl) {
      validB64.push(null);
      loadImagesAsBase64([refFrameUrl], function(rb64) {
        if (rb64[0]) validB64[validB64.length-1] = rb64[0];
        doCall(validB64);
      });
    } else {
      doCall(validB64);
    }
  });
}
}
